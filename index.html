    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        header {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #888;
            margin-top: 5px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .tool-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,217,255,0.2);
        }
        
        .tool-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        .tool-title {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #00d9ff;
        }
        
        .tool-desc {
            color: #aaa;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        .ad-section {
            margin: 40px 0;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            text-align: center;
        }
        
        .ad-placeholder {
            background: linear-gradient(90deg, #ddd, #eee);
            height: 100px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 0.9rem;
        }
        
        footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 0.85rem;
        }
        
        /* Tool Panel Styles */
        .tool-panel {
            display: none;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
        }
        
        .tool-panel.active {
            display: block;
        }
        
        .tool-panel textarea, .tool-panel input {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1rem;
            margin-bottom: 15px;
        }
        
        .tool-panel button {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            color: #1a1a2e;
            transition: opacity 0.3s;
        }
        
        .tool-panel button:hover {
            opacity: 0.8;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            white-space: pre-wrap;
            display: none;
        }
        
        .back-btn {
            background: transparent !important;
            border: 1px solid #00d9ff !important;
            color: #00d9ff !important;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🛠️ Leo 工具箱</h1>
        <p class="subtitle">免费在线工具集合</p>
    </header>
    
    <div class="container">
        <!-- AdSense Placeholder -->
        <div class="ad-section">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-1113273813232585"
                 data-ad-slot="1234567890"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
        </div>
        
        <div class="tools-grid">
            <div class="tool-card" onclick="openTool('json')">
                <div class="tool-icon">📄</div>
                <div class="tool-title">JSON 格式化</div>
                <div class="tool-desc">在线格式化、压缩、校验 JSON 数据</div>
            </div>
            
            <div class="tool-card" onclick="openTool('base64')">
                <div class="tool-icon">🔐</div>
                <div class="tool-title">Base64 编码</div>
                <div class="tool-desc">Base64 编码/解码工具</div>
            </div>
            
            <div class="tool-card" onclick="openTool('timestamp')">
                <div class="tool-icon">⏰</div>
                <div class="tool-title">时间戳转换</div>
                <div class="tool-desc">Unix 时间戳与日期互转</div>
            </div>
            
            <div class="tool-card" onclick="openTool('qrcode')">
                <div class="tool-icon">📱</div>
                <div class="tool-title">二维码生成</div>
                <div class="tool-desc">输入文字或链接生成二维码</div>
            </div>
            
            <div class="tool-card" onclick="openTool('color')">
                <div class="tool-icon">🎨</div>
                <div class="tool-title">颜色转换</div>
                <div class="tool-desc">HEX、RGB、HSL 颜色互转</div>
            </div>
            
            <div class="tool-card" onclick="openTool('hash')">
                <div class="tool-icon">🔑</div>
                <div class="tool-title">Hash 生成</div>
                <div class="tool-desc">MD5、SHA1、SHA256 加密</div>
            </div>
        </div>
        
        <!-- AdSense Placeholder -->
        <div class="ad-section">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-1113273813232585"
                 data-ad-slot="9876543210"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
        </div>
        
        <!-- Tool Panels -->
        <div id="json-panel" class="tool-panel">
            <h2>📄 JSON 格式化工具</h2>
            <textarea id="json-input" rows="6" placeholder="请输入 JSON 内容..."></textarea>
            <button onclick="formatJSON()">格式化</button>
            <button class="back-btn" onclick="closeTool()">返回</button>
            <div id="json-result" class="result"></div>
        </div>
        
        <div id="base64-panel" class="tool-panel">
            <h2>🔐 Base64 编码/解码</h2>
            <textarea id="base64-input" rows="6" placeholder="请输入内容..."></textarea>
            <button onclick="encodeBase64()">编码</button>
            <button onclick="decodeBase64()">解码</button>
            <button class="back-btn" onclick="closeTool()">返回</button>
            <div id="base64-result" class="result"></div>
        </div>
        
        <div id="timestamp-panel" class="tool-panel">
            <h2>⏰ 时间戳转换</h2>
            <input type="text" id="timestamp-input" placeholder="输入时间戳或日期 (如: 1704067200 或 2024-01-01)">
            <button onclick="convertTimestamp()">转换</button>
            <button class="back-btn" onclick="closeTool()">返回</button>
            <div id="timestamp-result" class="result"></div>
        </div>
        
        <div id="qrcode-panel" class="tool-panel">
            <h2>📱 二维码生成</h2>
            <textarea id="qrcode-input" rows="3" placeholder="请输入文字或链接..."></textarea>
            <button onclick="generateQR()">生成二维码</button>
            <button class="back-btn" onclick="closeTool()">返回</button>
            <div id="qrcode-result" class="result" style="text-align: center;"></div>
        </div>
        
        <div id="color-panel" class="tool-panel">
            <h2>🎨 颜色转换</h2>
            <input type="text" id="color-input" placeholder="输入颜色值 (如: #00d9ff 或 rgb(0,217,255))">
            <button onclick="convertColor()">转换</button>
            <button class="back-btn" onclick="closeTool()">返回</button>
            <div id="color-result" class="result"></div>
        </div>
        
        <div id="hash-panel" class="tool-panel">
            <h2>🔑 Hash 生成</h2>
            <textarea id="hash-input" rows="4" placeholder="请输入要加密的内容..."></textarea>
            <button onclick="generateHash('md5')">MD5</button>
            <button onclick="generateHash('sha1')">SHA1</button>
            <button onclick="generateHash('sha256')">SHA256</button>
            <button class="back-btn" onclick="closeTool()">返回</button>
            <div id="hash-result" class="result"></div>
        </div>
    </div>
    
    <footer>
        <p>© 2026 Leo 工具箱 | 让工具创造价值</p>
    </footer>
    
    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
    
    <script>
        function openTool(toolName) {
            document.querySelectorAll('.tool-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(toolName + '-panel').classList.add('active');
            window.scrollTo({ top: 300, behavior: 'smooth' });
        }
        
        function closeTool() {
            document.querySelectorAll('.tool-panel').forEach(p => p.classList.remove('active'));
        }
        
        function showResult(id, text) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.style.display = 'block';
        }
        
        // JSON Formatter
        function formatJSON() {
            try {
                const input = document.getElementById('json-input').value;
                const obj = JSON.parse(input);
                showResult('json-result', JSON.stringify(obj, null, 2));
            } catch(e) {
                showResult('json-result', 'JSON 格式错误: ' + e.message);
            }
        }
        
        // Base64
        function encodeBase64() {
            const input = document.getElementById('base64-input').value;
            showResult('base64-result', btoa(unescape(encodeURIComponent(input))));
        }
        
        function decodeBase64() {
            try {
                const input = document.getElementById('base64-input').value;
                showResult('base64-result', decodeURIComponent(escape(atob(input))));
            } catch(e) {
                showResult('base64-result', '解码失败: ' + e.message);
            }
        }
        
        // Timestamp
        function convertTimestamp() {
            const input = document.getElementById('timestamp-input').value.trim();
            if (/^\d+$/.test(input)) {
                const date = new Date(input * 1000);
                showResult('timestamp-result', '时间戳 ' + input + ' = ' + date.toLocaleString('zh-CN'));
            } else {
                const date = new Date(input);
                if (!isNaN(date.getTime())) {
                    showResult('timestamp-result', date.toLocaleString('zh-CN') + ' = ' + Math.floor(date.getTime()/1000));
                } else {
                    showResult('timestamp-result', '日期格式错误');
                }
            }
        }
        
        // QR Code (using api.qrserver.com)
        function generateQR() {
            const input = document.getElementById('qrcode-input').value;
            if (input) {
                const img = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(input)}" alt="QR Code">`;
                showResult('qrcode-result', img);
            }
        }
        
        // Color Conversion
        function convertColor() {
            const input = document.getElementById('color-input').value.trim();
            let hex = input;
            if (!hex.startsWith('#')) hex = '#' + input.replace(/[^0-9a-f]/gi, '');
            if (/^#[0-9a-f]{6}$/i.test(hex)) {
                const r = parseInt(hex.slice(1,3), 16);
                const g = parseInt(hex.slice(3,5), 16);
                const b = parseInt(hex.slice(5,7), 16);
                showResult('color-result', `HEX: ${hex}\nRGB: rgb(${r},${g},${b})`);
            } else {
                showResult('color-result', '请输入有效的 HEX 颜色值');
            }
        }
        
        // Hash (simple implementation)
        async function generateHash(type) {
            const input = document.getElementById('hash-input').value;
            const encoder = new TextEncoder();
            const data = encoder.encode(input);
            const hashBuffer = await crypto.subtle.digest(type === 'md5' ? 'SHA-1' : type.toUpperCase(), data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
            showResult('hash-result', type.toUpperCase() + ': ' + hashHex);
        }
    </script>
</body>
</html>
