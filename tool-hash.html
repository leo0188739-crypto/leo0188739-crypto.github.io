<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Generator - Leo Tools</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1113273813232585"
     crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        header {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .lang-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .lang-btn.active { background: #00d9ff; color: #1a1a2e; }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 30px;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        h2 { font-size: 1.8rem; margin-bottom: 20px; color: #00d9ff; }
        textarea {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1rem;
            margin-bottom: 15px;
            min-height: 100px;
        }
        button {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            color: #1a1a2e;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            white-space: pre-wrap;
            display: none;
            font-family: monospace;
            word-break: break-all;
        }
        .result.show { display: block; }
        .ad-section { margin: 20px 0; text-align: center; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>🛠️ Leo Tools</h1>
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="zh">中文</button>
        </div>
    </header>
    
    <div class="container">
        <a href="/" class="back-btn">← <span data-en="Back to Tools" data-zh="返回工具主页">Back to Tools</span></a>
        
        <h2 data-en="Hash Generator" data-zh="Hash 生成">Hash Generator</h2>
        
        <textarea id="hash-input" placeholder="Enter text to hash..."></textarea>
        
        <button onclick="generateHash('MD5')" data-en="MD5" data-zh="MD5">MD5</button>
        <button onclick="generateHash('SHA-1')" data-en="SHA-1" data-zh="SHA-1">SHA-1</button>
        <button onclick="generateHash('SHA-256')" data-en="SHA-256" data-zh="SHA-256">SHA-256</button>
        
        <div id="hash-result" class="result"></div>
        
        <div class="ad-section">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-1113273813232585"
                 data-ad-slot="1234567890"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
        </div>
    </div>
    
    <script>
        const langBtns = document.querySelectorAll('.lang-btn');
        langBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const lang = btn.dataset.lang;
                langBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
All('[data-en                document.querySelector][data-zh]').forEach(el => {
                    el.textContent = el.dataset[lang];
                });
                localStorage.setItem('leo-tools-lang', lang);
            });
        });
        const savedLang = localStorage.getItem('leo-tools-lang') || 'en';
        document.querySelector(`.lang-btn[data-lang="${savedLang}"]`).click();
        
        async function generateHash(type) {
            const input = document.getElementById('hash-input').value;
            const result = document.getElementById('hash-result');
            
            try {
                const encoder = new TextEncoder();
                const data = encoder.encode(input);
                const hashBuffer = await crypto.subtle.digest(type, data);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashHex = hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
                result.textContent = `${type}: ${hashHex}`;
            } catch(e) {
                result.textContent = 'Error: ' + e.message;
            }
            result.classList.add('show');
        }
    </script>
    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
