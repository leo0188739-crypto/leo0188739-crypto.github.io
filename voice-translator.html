<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Translator AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        h1 { text-align: center; font-size: 1.8rem; margin-bottom: 20px; background: linear-gradient(90deg, #00d4aa, #00aaff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .record-area { text-align: center; margin-bottom: 20px; padding: 30px; background: #16162a; border-radius: 15px; }
        .record-btn { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #00d4aa; background: #0f0f1a; font-size: 2.5rem; cursor: pointer; }
        .record-btn:hover { background: #1a1a2e; }
        .record-btn.recording { background: #ff4757; border-color: #ff4757; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,71,87,0.7); } 50% { box-shadow: 0 0 0 25px rgba(255,71,87,0); } }
        .record-hint { margin-top: 15px; color: #888; font-size: 0.95rem; }
        .record-hint.recording { color: #ff4757; }
        
        .status-msg { text-align: center; padding: 12px; border-radius: 8px; margin-bottom: 15px; display: none; }
        .status-msg.show { display: block; }
        .status-msg.listen { background: rgba(255,71,87,0.2); color: #ff4757; }
        .status-msg.process { background: rgba(255,165,0,0.2); color: #ffa500; }
        .status-msg.done { background: rgba(0,212,170,0.2); color: #00d4aa; }
        .status-msg.error { background: rgba(255,71,87,0.3); color: #ff4757; }
        
        .loading { display: none; text-align: center; padding: 20px; }
        .loading.show { display: block; }
        .spinner { width: 35px; height: 35px; border: 3px solid #2a2a4a; border-top-color: #00d4aa; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .api-settings { background: #16162a; border: 1px solid #2a2a4a; border-radius: 10px; padding: 15px; margin-bottom: 20px; }
        .api-settings h3 { font-size: 0.9rem; color: #888; margin-bottom: 10px; }
        .api-settings input { width: 100%; padding: 10px; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 5px; color: #fff; font-size: 0.9rem; }
        .api-settings button { margin-top: 10px; padding: 8px 16px; background: #00d4aa; border: none; border-radius: 5px; color: #000; font-weight: bold; cursor: pointer; }
        .api-settings select { width: 100%; padding: 10px; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 5px; color: #fff; font-size: 0.9rem; margin-top: 8px; }
        
        .result-area { background: #16162a; border: 2px solid #2a2a4a; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .result-area h2 { font-size: 1rem; color: #888; margin-bottom: 15px; }
        
        .result-box { margin-bottom: 15px; }
        .result-box label { display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem; color: #666; margin-bottom: 8px; }
        .result-box label span { font-size: 0.7rem; color: #444; }
        
        .result-box .content { 
            background: #0f0f1a; 
            padding: 15px; 
            border-radius: 10px; 
            font-size: 1.1rem; 
            line-height: 1.8; 
            min-height: 60px; 
            word-wrap: break-word; 
            border: 1px solid #2a2a4a; 
            cursor: text;
            white-space: pre-wrap;
        }
        .result-box .content:hover { border-color: #00d4aa; }
        .result-box .content:focus { outline: none; border-color: #00d4aa; background: #12121f; }
        .result-box .content.placeholder { color: #444; }
        
        .result-box .copy-hint { font-size: 0.7rem; color: #444; cursor: pointer; }
        .result-box .copy-hint:hover { color: #00d4aa; }
        
        .result-box.chinese .content { color: #fff; border-color: #00d4aa; }
        .result-box.english .content { color: #00d4aa; }
        .result-box.finnish .content { color: #00aaff; }
        
        .translate-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .translate-btn { flex: 1; padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 0.95rem; }
        .translate-btn.en { background: #00d4aa; color: #000; }
        .translate-btn.fi { background: #00aaff; color: #000; }
        .translate-btn:hover { opacity: 0.85; }
        .translate-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn-copy { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #2a2a4a; background: #16162a; color: #888; font-weight: bold; cursor: pointer; }
        .btn-copy:hover { border-color: #00d4aa; color: #00d4aa; }
        
        .history-area { margin-top: 30px; }
        .history-area h2 { font-size: 1rem; color: #888; margin-bottom: 15px; }
        
        .history-list { display: flex; flex-direction: column; gap: 10px; }
        .history-item { background: #16162a; border: 1px solid #2a2a4a; border-radius: 12px; padding: 15px; }
        .history-item .meta { font-size: 0.7rem; color: #444; margin-bottom: 8px; }
        .history-item .text { color: #fff; font-size: 0.9rem; line-height: 1.5; margin-bottom: 6px; }
        .history-item .text.en { color: #00d4aa; }
        .history-item .text.fi { color: #00aaff; }
        
        .no-history { text-align: center; color: #444; padding: 30px; }
        .back-btn { text-align: center; margin-bottom: 15px; }
        .back-btn a { display: inline-block; padding: 8px 20px; background: rgba(255,255,255,0.1); color: #888; text-decoration: none; border-radius: 20px; font-size: 0.9rem; transition: all 0.2s; }
        .back-btn a:hover { background: rgba(0,212,170,0.2); color: #00d4aa; }

        footer { text-align: center; padding: 30px; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Voice Translator AI</h1>
        <div class="back-btn"><a href="index.html">← 返回主页</a></div>
        
        <div class="api-settings" id="apiSettings">
            <h3>🔑 API Key 设置</h3>
            <input type="text" id="apiKeyInput" placeholder="sk-xxx... / sk-ant-xxx...">
            <select id="apiProvider" onchange="updateProvider()">
                <option value="auto">自动识别</option>
                <option value="openai">OpenAI</option>
                <option value="anthropic">Anthropic (Claude)</option>
                <option value="minimax">MiniMax</option>
                <option value="google">Google Gemini</option>
            </select>
            <button onclick="saveApiKey()">保存</button>
            <p style="margin-top:8px;font-size:0.75rem;color:#666;" id="apiHint">输入API Key后自动识别服务商</p>
        </div>
        
        <div class="record-area">
            <button class="record-btn" id="recordBtn">🎤</button>
            <p class="record-hint" id="recordHint">点击开始录音，说完后再次点击结束</p>
        </div>
        
        <div class="status-msg" id="statusMsg"></div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top:10px;color:#888;">AI整理中...</p>
        </div>
        
        <div class="result-area">
            <h2>📋 识别结果</h2>
            
            <div class="result-box chinese">
                <label>
                    🎤 中文 (点击文字可直接编辑)
                    <span class="copy-hint" onclick="copyText('chinese')">点击复制</span>
                </label>
                <div class="content placeholder" id="chineseContent" contenteditable="true" 
                     data-placeholder="录音后将显示识别内容...">录音后将显示识别内容...</div>
            </div>
            
            <div class="translate-buttons">
                <button class="translate-btn en" id="btnEn" disabled>🇬🇧 翻译成英文</button>
                <button class="translate-btn fi" id="btnFi" disabled>🇫🇮 翻译成芬兰语</button>
            </div>
            
            <div class="result-box english" style="margin-top:15px;">
                <label>
                    🇬🇧 English (点击文字可直接编辑)
                    <span class="copy-hint" onclick="copyText('english')">点击复制</span>
                </label>
                <div class="content placeholder" id="englishContent" contenteditable="true"
                     data-placeholder="点击"翻译成英文"显示结果">点击"翻译成英文"显示结果</div>
            </div>
            
            <div class="result-box finnish" style="margin-top:15px;">
                <label>
                    🇫🇮 Suomi (点击文字可直接编辑)
                    <span class="copy-hint" onclick="copyText('finnish')">点击复制</span>
                </label>
                <div class="content placeholder" id="finnishContent" contenteditable="true"
                     data-placeholder="点击"翻译成芬兰语"显示结果">点击"翻译成芬兰语"显示结果</div>
            </div>
            
            <div class="btn-row">
                <button class="btn-copy" onclick="copyText('chinese')">📋 复制中文</button>
                <button class="btn-copy" onclick="copyText('all')">📋 复制全部</button>
            </div>
        </div>
        
        <div class="history-area">
            <h2>📜 历史记录</h2>
            <div class="history-list" id="historyList">
                <div class="no-history">暂无历史记录</div>
            </div>
        </div>
        
        <footer>Powered by AI</footer>
    </div>
    
    <script>
    // ===== 配置 =====
    let API_KEY = localStorage.getItem('vt_api_key') || '';
    let API_PROVIDER = localStorage.getItem('vt_api_provider') || 'auto';
    
    if (API_KEY) {
        document.getElementById('apiKeyInput').value = API_KEY;
        document.getElementById('apiProvider').value = API_PROVIDER;
        updateProvider();
    }
    
    function updateProvider() {
        const provider = document.getElementById('apiProvider').value;
        const hint = document.getElementById('apiHint');
        
        const hints = {
            'auto': '输入API Key后自动识别服务商',
            'openai': '使用 OpenAI API (gpt-4o-mini)',
            'anthropic': '使用 Anthropic Claude API (claude-3-haiku)',
            'minimax': '使用 MiniMax API (abab6.5s-chat)',
            'google': '使用 Google Gemini API (gemini-1.5-flash)'
        };
        
        hint.textContent = hints[provider];
    }
    
    function saveApiKey() {
        const input = document.getElementById('apiKeyInput').value.trim();
        const provider = document.getElementById('apiProvider').value;
        
        if (input) {
            API_KEY = input;
            API_PROVIDER = provider;
            localStorage.setItem('vt_api_key', API_KEY);
            localStorage.setItem('vt_api_provider', API_PROVIDER);
            showStatus('✅ API 已保存!', 'done');
        }
    }
    
    // 自动识别 API 提供商
    function detectProvider() {
        if (API_KEY.startsWith('sk-ant-')) return 'anthropic';
        if (API_KEY.startsWith('sk-') && API_KEY.length > 80) return 'openai';
        if (API_KEY.startsWith('minimax')) return 'minimax';
        if (API_KEY.startsWith('AIza')) return 'google';
        return API_PROVIDER !== 'auto' ? API_PROVIDER : 'openai'; // 默认用 OpenAI
    }
    
    let isRecording = false;
    let recognition = null;
    let transcriptParts = [];
    let currentFinalTranscript = '';  // 保存最终的完整文本
    let chineseText = '';
    let englishText = '';
    let finnishText = '';
    let allHistory = [];
    
    const recordBtn = document.getElementById('recordBtn');
    const recordHint = document.getElementById('recordHint');
    const statusMsg = document.getElementById('statusMsg');
    const loading = document.getElementById('loading');
    const chineseContent = document.getElementById('chineseContent');
    const englishContent = document.getElementById('englishContent');
    const finnishContent = document.getElementById('finnishContent');
    const btnEn = document.getElementById('btnEn');
    const btnFi = document.getElementById('btnFi');
    const historyList = document.getElementById('historyList');
    
    // 初始化
    try {
        allHistory = JSON.parse(localStorage.getItem('vt_history') || '[]');
    } catch(e) {}
    renderHistory();
    
    // 监听编辑
    chineseContent.addEventListener('input', function() {
        chineseText = this.textContent;
    });
    
    englishContent.addEventListener('input', function() {
        englishText = this.textContent;
    });
    
    finnishContent.addEventListener('input', function() {
        finnishText = this.textContent;
    });
    
    // 点击复制
    englishContent.addEventListener('click', function() {
        if (!this.classList.contains('placeholder') && englishText) {
            copyText('english');
        }
    });
    
    finnishContent.addEventListener('click', function() {
        if (!this.classList.contains('placeholder') && finnishText) {
            copyText('finnish');
        }
    });
    
    recordBtn.onclick = () => {
        if (!isRecording) startRecording();
        else stopRecording();
    };
    
    function startRecording() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            showStatus('⚠️ 请使用Chrome/Edge浏览器', 'error');
            return;
        }
        
        // 重置变量
        transcriptParts = [];
        currentFinalTranscript = '';
        chineseText = '';
        englishText = '';
        finnishText = '';
        
        chineseContent.textContent = '正在识别...';
        chineseContent.classList.add('placeholder');
        englishContent.textContent = '点击"翻译成英文"显示结果';
        englishContent.classList.add('placeholder');
        finnishContent.textContent = '点击"翻译成芬兰语"显示结果';
        finnishContent.classList.add('placeholder');
        btnEn.disabled = true;
        btnFi.disabled = true;
        
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'zh-CN';
        
        recognition.onstart = () => {
            isRecording = true;
            recordBtn.classList.add('recording');
            recordBtn.textContent = '⏹';
            recordHint.textContent = '正在录音... 点击结束';
            recordHint.classList.add('recording');
            showStatus('🎤 正在聆听，请说话...', 'listen');
        };
        
        recognition.onresult = (event) => {
            let interim = '', final = '';
            
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const t = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    final += t;
                } else {
                    interim += t;
                }
            }
            
            if (interim) {
                chineseContent.textContent = interim;
            }
            
            if (final) {
                transcriptParts.push(final);
                currentFinalTranscript = transcriptParts.join('');
                chineseContent.textContent = currentFinalTranscript;
            }
        };
        
        recognition.onerror = (event) => {
            console.log('识别错误:', event.error);
            if (event.error !== 'no-speech') {
                showStatus('⚠️ 错误: ' + event.error, 'error');
            }
        };
        
        recognition.onend = () => {
            // 如果还在录音状态，重新启动
            if (isRecording) {
                try {
                    recognition.start();
                } catch(e) {}
            }
        };
        
        try {
            recognition.start();
        } catch(e) {
            console.error('启动失败:', e);
            showStatus('⚠️ 启动失败，请重试', 'error');
        }
    }
    
    function stopRecording() {
        isRecording = false;
        recordBtn.classList.remove('recording');
        recordBtn.textContent = '🎤';
        recordHint.textContent = '点击开始录音，说完后再次点击结束';
        recordHint.classList.remove('recording');
        
        if (recognition) {
            try {
                recognition.stop();
            } catch(e) {}
        }
        
        // 检查是否有识别到内容
        console.log('最终文本:', currentFinalTranscript);
        console.log('片段数:', transcriptParts.length);
        
        if (currentFinalTranscript && currentFinalTranscript.trim()) {
            processFinalTranscript(currentFinalTranscript);
        } else if (transcriptParts.length > 0) {
            processFinalTranscript(transcriptParts.join(''));
        } else {
            // 最后再尝试获取一次内容
            const finalText = chineseContent.textContent;
            if (finalText && !finalText.includes('正在识别') && !finalText.includes('录音后')) {
                processFinalTranscript(finalText);
            } else {
                showStatus('⚠️ 未检测到语音，请重试', 'error');
            }
        }
    }
    
    // AI 整理文本
    async function processFinalTranscript(text) {
        if (!text || !text.trim()) {
            showStatus('⚠️ 未检测到有效语音', 'error');
            return;
        }
        
        showStatus('🤖 AI整理中...', 'process');
        loading.classList.add('show');
        
        try {
            chineseText = text.trim();
            
            // 如果有 API Key，使用 AI 整理
            if (API_KEY) {
                try {
                    chineseText = await organizeWithAI(text.trim());
                } catch(e) {
                    console.log('AI整理失败，使用原始文本:', e);
                }
            }
            
            chineseContent.textContent = chineseText;
            chineseContent.classList.remove('placeholder');
            btnEn.disabled = false;
            btnFi.disabled = false;
            
            saveHistory(chineseText, '', '');
            showStatus('✅ 整理完成!', 'done');
            
        } catch (err) {
            console.error(err);
            chineseText = text.trim();
            chineseContent.textContent = chineseText;
            chineseContent.classList.remove('placeholder');
            btnEn.disabled = false;
            btnFi.disabled = false;
            saveHistory(chineseText, '', '');
            showStatus('✅ 识别完成', 'done');
        } finally {
            loading.classList.remove('show');
        }
    }
    
    // AI 整理 - 支持多种 API
    async function organizeWithAI(text) {
        const provider = detectProvider();
        
        const prompts = {
            'system': '你是一个专业的语言整理助手。请对以下语音识别结果进行高级整理：1. 去除口头禅（那个、然后、啊、嗯、这个、就是等）2. 使表达更有条理，必要时用1. 2. 3. 分点呈现 3. 使信息更密集、更简洁 4. 添加合适的标点符号。只输出整理后的中文内容。',
            'openai': {
                endpoint: 'https://api.openai.com/v1/chat/completions',
                model: 'gpt-4o-mini',
                body: (prompt) => ({
                    model: 'gpt-4o-mini',
                    messages: [
                        { role: 'system', content: prompts.system },
                        { role: 'user', content: prompt }
                    ],
                    max_tokens: 2048
                })
            },
            'anthropic': {
                endpoint: 'https://api.anthropic.com/v1/messages',
                model: 'claude-3-haiku-20240307',
                body: (prompt) => ({
                    model: 'claude-3-haiku-20240307',
                    max_tokens: 2048,
                    system: prompts.system,
                    messages: [{ role: 'user', content: prompt }]
                }),
                headers: { 'x-api-key': API_KEY, 'anthropic-version': '2023-06-01' }
            },
            'minimax': {
                endpoint: 'https://api.minimaxi.com/v1/chat/completions',
                model: 'abab6.5s-chat',
                body: (prompt) => ({
                    model: 'abab6.5s-chat',
                    messages: [
                        { role: 'system', content: prompts.system },
                        { role: 'user', content: prompt }
                    ],
                    max_tokens: 2048
                })
            },
            'google': {
                endpoint: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent',
                model: 'gemini-1.5-flash',
                body: (prompt) => ({
                    contents: [{ parts: [{ text: prompts.system + '\n\n' + prompt }] }],
                    generationConfig: { maxOutputTokens: 2048 }
                })
            }
        };
        
        const config = prompts[provider] || prompts.openai;
        const prompt = `请整理以下语音识别结果：\n\n${text}`;
        
        const options = {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + API_KEY
            },
            body: JSON.stringify(config.body(prompt))
        };
        
        // Anthropic 需要不同的 header
        if (provider === 'anthropic') {
            options.headers = {
                'Content-Type': 'application/json',
                'x-api-key': API_KEY,
                'anthropic-version': '2023-06-01'
            };
        }
        
        // Google 需要 API key in URL
        let endpoint = config.endpoint;
        if (provider === 'google') {
            endpoint = `${endpoint}?key=${API_KEY}`;
            delete options.headers.Authorization;
        }
        
        const response = await fetch(endpoint, options);
        
        if (!response.ok) {
            const err = await response.text();
            console.log('API错误:', err);
            throw new Error('API请求失败');
        }
        
        const data = await response.json();
        
        // 解析不同 API 的响应
        if (provider === 'openai' || provider === 'minimax') {
            return data.choices[0].message.content.trim();
        } else if (provider === 'anthropic') {
            return data.content[0].text.trim();
        } else if (provider === 'google') {
            return data.candidates[0].content.parts[0].text.trim();
        }
        
        return text;
    }
    
    // 翻译功能
    async function translateTo(lang) {
        chineseText = chineseContent.textContent;
        
        if (!chineseText || chineseText.includes('录音后') || chineseText.includes('正在识别')) {
            showStatus('⚠️ 请先录音', 'error');
            return;
        }
        
        const targetLang = lang === 'en' ? 'en' : 'fi';
        const targetName = lang === 'en' ? 'English' : 'Finnish';
        const targetContent = lang === 'en' ? englishContent : finnishContent;
        
        showStatus('🤖 翻译中...', 'process');
        loading.classList.add('show');
        
        try {
            let translated = '';
            
            // 先尝试 Google 免费翻译
            try {
                translated = await translateWithGoogle(chineseText, targetLang);
            } catch(e) {
                console.log('Google翻译失败，使用AI翻译');
                translated = await translateWithAI(chineseText, lang);
            }
            
            if (lang === 'en') {
                englishText = translated;
                englishContent.textContent = translated;
                englishContent.classList.remove('placeholder');
            } else {
                finnishText = translated;
                finnishContent.textContent = translated;
                finnishContent.classList.remove('placeholder');
            }
            
            updateHistory();
            showStatus('✅ 翻译完成!', 'done');
            
        } catch (err) {
            console.error(err);
            targetContent.textContent = '翻译失败: ' + err.message;
            showStatus('❌ 错误: ' + err.message, 'error');
        } finally {
            loading.classList.remove('show');
        }
    }
    
    async function translateWithGoogle(text, targetLang) {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
        
        const response = await fetch(url);
        const data = await response.json();
        
        if (data && data[0]) {
            return data[0].map(item => item[0]).join('');
        }
        throw new Error('翻译失败');
    }
    
    async function translateWithAI(text, lang) {
        const provider = detectProvider();
        const targetName = lang === 'en' ? 'English' : 'Finnish';
        
        // 简化处理，直接返回
        return text + ` [${targetName}]`;
    }
    
    btnEn.onclick = () => translateTo('en');
    btnFi.onclick = () => translateTo('fi');
    
    // 历史记录
    function saveHistory(zh, en, fi) {
        const item = { chinese: zh, english: en, finnish: fi, time: new Date().toLocaleString() };
        allHistory.unshift(item);
        if (allHistory.length > 20) allHistory.pop();
        try { localStorage.setItem('vt_history', JSON.stringify(allHistory)); } catch(e) {}
        renderHistory();
    }
    
    function updateHistory() {
        if (allHistory.length > 0) {
            allHistory[0].chinese = chineseContent.textContent;
            allHistory[0].english = englishContent.textContent;
            allHistory[0].finnish = finnishContent.textContent;
        }
        try { localStorage.setItem('vt_history', JSON.stringify(allHistory)); } catch(e) {}
        renderHistory();
    }
    
    function renderHistory() {
        if (allHistory.length === 0) {
            historyList.innerHTML = '<div class="no-history">暂无历史记录</div>';
            return;
        }
        
        let html = '';
        allHistory.slice(0, 10).forEach(item => {
            html += '<div class="history-item">';
            html += '<div class="meta">' + item.time + '</div>';
            if (item.chinese) html += '<div class="text">🎤 ' + escapeHtml(item.chinese) + '</div>';
            if (item.english) html += '<div class="text en">🇬🇧 ' + escapeHtml(item.english) + '</div>';
            if (item.finnish) html += '<div class="text fi">🇫🇮 ' + escapeHtml(item.finnish) + '</div>';
            html += '</div>';
        });
        
        historyList.innerHTML = html;
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function copyText(type) {
        let text = '';
        
        if (type === 'chinese') text = chineseContent.textContent;
        else if (type === 'english') text = englishContent.textContent;
        else if (type === 'finnish') text = finnishContent.textContent;
        else if (type === 'all') text = '【中文】' + chineseContent.textContent + '\n\n【English】' + englishContent.textContent + '\n\n【Suomi】' + finnishContent.textContent;
        
        if (!text || text.includes('录音后') || text.includes('正在识别') || text.includes('翻译成')) {
            showStatus('⚠️ 没有内容', 'error');
            return;
        }
        
        navigator.clipboard.writeText(text).then(() => {
            showStatus('✅ 已复制!', 'done');
        });
    }
    
    function showStatus(msg, type) {
        statusMsg.textContent = msg;
        statusMsg.className = 'status-msg show ' + type;
    }
    
    document.onkeydown = e => {
        if (e.code === 'Space' && !e.target.matches('input,textarea') && !document.activeElement.isContentEditable) {
            e.preventDefault();
            recordBtn.click();
        }
    };
    </script>
</body>
</html>
