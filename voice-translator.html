<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Translator - Leo Tools</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1113273813232585"
     crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        header {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .lang-group { display: flex; gap: 8px; }
        .lang-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .lang-btn.active { background: #00d9ff; color: #1a1a2e; }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 30px;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        
        h2 { font-size: 1.8rem; margin-bottom: 20px; color: #00d9ff; }
        
        .input-area { margin-bottom: 30px; }
        .input-area textarea {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1.1rem;
            min-height: 120px;
            margin-bottom: 15px;
        }
        .input-area textarea:focus { outline: none; border-color: #00d9ff; }
        
        .lang-select {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .lang-select select {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1rem;
        }
        
        button {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            color: #1a1a2e;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        .loading.show { display: block; }
        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #00d9ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .result {
            margin-top: 30px;
            padding: 25px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            display: none;
        }
        .result.show { display: block; }
        .result h3 { color: #00ff88; margin-bottom: 15px; }
        .result p { margin-bottom: 12px; line-height: 1.8; }
        .result .label { color: #00d9ff; font-weight: bold; }
        
        .ad-section { margin: 20px 0; text-align: center; }
        
        .mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid #00d9ff;
            background: rgba(0,0,0,0.3);
            font-size: 2rem;
            cursor: pointer;
            margin: 20px auto;
            display: block;
        }
        .mic-btn.recording {
            background: #ff4757;
            border-color: #ff4757;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,71,87,0.5); }
            50% { box-shadow: 0 0 0 20px rgba(255,71,87,0); }
        }
        .mic-hint { text-align: center; color: #888; margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>🎙️ Leo Tools</h1>
            <div class="lang-group">
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="zh">中文</button>
            </div>
        </div>
    </header>
    
    <div class="container">
        <a href="/" class="back-btn">← <span data-en="Back to Tools" data-zh="返回工具主页">Back to Tools</span></a>
        
        <h2 data-en="Voice Translator" data-zh="语音翻译">Voice Translator</h2>
        
        <div class="input-area">
            <div style="text-align:center; margin-bottom:20px;">
                <button class="mic-btn" id="micBtn">🎤</button>
                <p class="mic-hint" id="micHint" data-en="Click to start recording" data-zh="点击开始录音">Click to start recording</p>
            </div>
            
            <textarea id="textInput" placeholder="Or enter text here to translate..."></textarea>
            
            <div class="lang-select">
                <select id="fromLang">
                    <option value="auto" data-en="Auto Detect" data-zh="自动检测">Auto Detect</option>
                    <option value="zh" selected>中文</option>
                    <option value="en">English</option>
                    <option value="fi">Suomi</option>
                </select>
                <span style="align-self:center;">→</span>
                <select id="toLang">
                    <option value="en" selected>English</option>
                    <option value="zh">中文</option>
                    <option value="fi">Suomi</option>
                </select>
            </div>
            
            <button onclick="translateText()" id="translateBtn" data-en="Translate" data-zh="翻译">Translate</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <span data-en="Translating..." data-zh="正在翻译...">Translating...</span>
        </div>
        
        <div id="result" class="result"></div>
        
        <div class="ad-section">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-1113273813232585"
                 data-ad-slot="1234567890"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
        </div>
    </div>
    
    <script>
        // Language
        const langBtns = document.querySelectorAll('.lang-btn');
        let currentLang = localStorage.getItem('leo-tools-lang') || 'en';
        
        function updateLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-en][data-zh]').forEach(el => {
                el.textContent = el.dataset[lang];
            });
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
            document.documentElement.lang = lang;
            localStorage.setItem('leo-tools-lang', lang);
        }
        
        langBtns.forEach(btn => {
            btn.addEventListener('click', () => updateLanguage(btn.dataset.lang));
        });
        
        const savedLang = localStorage.getItem('leo-tools-lang') || 'en';
        document.querySelector(`.lang-btn[data-lang="${savedLang}"]`).click();
        
        // Voice Recording
        let mediaRecorder = null;
        let audioChunks = [];
        const micBtn = document.getElementById('micBtn');
        const micHint = document.getElementById('micHint');
        
        micBtn.addEventListener('click', async () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                micBtn.classList.remove('recording');
                micHint.textContent = micHint.dataset[currentLang];
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        // Convert to text using Web Speech API as fallback
                        try {
                            const audioUrl = URL.createObjectURL(audioBlob);
                            const audio = new Audio(audioUrl);
                            // For now, just show message that recording is done
                            document.getElementById('textInput').value += ' [Audio recorded] ';
                        } catch(e) {
                            console.log('Audio saved but cannot process');
                        }
                    };
                    
                    mediaRecorder.start();
                    micBtn.classList.add('recording');
                    micHint.textContent = currentLang === 'zh' ? '点击停止录音' : 'Click to stop';
                } catch(e) {
                    alert('Microphone access denied');
                }
            }
        });
        
        // Translation via Groq API
        async function translateText() {
            const text = document.getElementById('textInput').value.trim();
            if (!text) return;
            
            const fromLang = document.getElementById('fromLang').value;
            const toLang = document.getElementById('toLang').value;
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            
            loading.classList.add('show');
            result.classList.remove('show');
            
            const isZh = currentLang === 'zh';
            const langNames = { zh: 'Chinese', en: 'English', fi: 'Finnish', auto: 'Detected' };
            
            const systemPrompt = `You are a professional translator. Translate the following text from ${langNames[fromLang] || 'source language'} to ${langNames[toLang]}.
- If source is "auto", detect the language first
- Provide only the translation, no explanations
- Keep the same tone and style`;
            
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer 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'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: [
                            {role: 'system', content: systemPrompt},
                            {role: 'user', content: text}
                        ],
                        temperature: 0.3,
                        max_tokens: 1000
                    })
                });
                
                const data = await response.json();
                const translation = data.choices?.[0]?.message?.content;
                
                if (translation) {
                    result.innerHTML = `
                        <h3>✅ Translation Complete</h3>
                        <p><span class="label">${isZh ? '原文' : 'Original'}:</span></p>
                        <p>${text}</p>
                        <p><span class="label">${isZh ? '翻译' : 'Translation'} (${langNames[toLang]}):</span></p>
                        <p>${translation}</p>
                    `;
                } else {
                    result.innerHTML = `<h3>Error</h3><p>${data.error?.message || 'Translation failed'}</p>`;
                }
            } catch (e) {
                result.innerHTML = `<h3>Error</h3><p>${e.message}</p>`;
            }
            
            loading.classList.remove('show');
            result.classList.add('show');
        }
    </script>
    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
