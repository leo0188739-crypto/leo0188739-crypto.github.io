<html lang="zh">
<head>

    <meta charset="UTF-8">

    <title>🤖 AI Agent 状态监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        
        h1 { text-align: center; margin-bottom: 30px; font-size: 2rem; }
        h1 span { animation: pulse 2s infinite; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .status-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .status-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .status-title { font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        
        .status-indicator { width: 15px; height: 15px; border-radius: 50%; display: inline-block; }
        .status-indicator.online { background: #00ff88; box-shadow: 0 0 20px #00ff88; animation: blink 2s infinite; }
        .status-indicator.offline { background: #ff4444; box-shadow: 0 0 20px #ff4444; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .status-value { font-size: 2rem; font-weight: bold; color: #00ff88; }
        .status-value.warning { color: #ffaa00; }
        .status-value.error { color: #ff4444; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        
        .stat-item { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; }
        .stat-label { font-size: 0.85rem; color: rgba(255,255,255,0.7); margin-bottom: 5px; }
        .stat-value { font-size: 1.3rem; font-weight: 600; }
        
        .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 4px; transition: width 0.5s; }
        .progress-fill.low { background: #00ff88; }
        .progress-fill.medium { background: #ffaa00; }
        .progress-fill.high { background: #ff4444; }
        
        /* Task Module Styles */
        .task-list { display: flex; flex-direction: column; gap: 12px; }
        
        .task-item {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 15px;
            transition: all 0.2s;
            border: 2px solid transparent;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        
        .task-item:hover { border-color: rgba(255,255,255,0.2); }
        
        .task-item.dragging {
            opacity: 0.5;
            transform: scale(0.98);
            border-color: #00ff88;
            box-shadow: 0 10px 30px rgba(0,255,136,0.3);
        }
        
        .task-item.drag-over {
            border-color: #00ff88;
            background: rgba(0,255,136,0.1);
        }
        
        .task-item .drag-handle {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 20px;
            cursor: grab;
            padding: 5px;
        }
        
        .task-item .drag-handle:active { cursor: grabbing; }
        
        .task-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding-left: 25px; }
        
        .task-number {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.85rem;
        }
        
        .task-name { font-weight: 600; font-size: 1rem; }
        
        .task-progress { display: flex; align-items: center; gap: 10px; margin-top: 8px; padding-left: 25px; }
        
        .progress-bar-container {
            flex: 1;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            overflow: hidden;
        }
        
        .task-progress-bar { height: 100%; border-radius: 5px; transition: width 0.3s; }
        
        .task-percent { font-size: 0.9rem; font-weight: bold; min-width: 45px; text-align: right; }
        
        .task-empty {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.5);
        }
        
        /* Action Buttons */
        .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        
        .action-btn {
            padding: 15px 20px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .action-btn:hover { transform: translateY(-2px); }
        .action-btn:active { transform: translateY(0); }
        
        .action-btn.compress { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
        .action-btn.gateway { background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; }
        .action-btn.openclaw { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #1a1a2e; }
        .action-btn.health { background: linear-gradient(135deg, #fa709a, #fee140); color: #1a1a2e; }
        
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        /* Log */
        .log-container { max-height: 250px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 15px; font-family: 'Consolas', monospace; font-size: 0.85rem; }
        .log-entry { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; gap: 10px; }
        .log-time { color: #666; }
        .log-msg { color: #ccc; }
        
        .last-update { text-align: center; color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-top: 20px; }
        
        .refresh-btn {
            display: block;
            margin: 20px auto 0;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .refresh-btn:hover { transform: scale(1.05); }
        
        .emoji { font-size: 1.5rem; }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            transform: translateX(200%);
            transition: transform 0.3s;
        }
        
        .notification.show { transform: translateX(0); }
        .notification.success { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #1a1a2e; }
        .notification.error { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
        .notification.info { background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; }
        
        @media (max-width: 600px) {
            .grid, .action-grid { grid-template-columns: 1fr; }
            .task-item { padding: 12px; }
            .task-header, .task-progress { padding-left: 30px; }
        }
    </style>
</head>
<body>

    <script>

    document.querySelectorAll('[data-en][data-zh]').forEach(el => el.textContent = el.dataset[currentLang]);

    <script>
    let currentLang = 'en';
    function toggleLang(btn) {
        currentLang = currentLang === 'en' ? 'zh' : 'en';
        btn.textContent = currentLang === 'en' ? 'EN' : '中文';
        document.querySelectorAll('[data-en][data-zh]').forEach(el => el.textContent = el.dataset[currentLang]);

    </script>
    <div class="container">
        <h1><span>🤖</span> AI Agent 状态监控</h1>
        
        <!-- 任务模块 -->
        <div class="status-card">
            <div class="status-header">
                <div class="status-title">
                    <span class="emoji">📋</span>
                    当前任务队列
                </div>
                <span style="font-size: 0.85rem; color: rgba(255,255,255,0.5);">👆 拖动调整顺序</span>
            </div>
            <div class="task-list" id="taskList">
                <!-- 任务会动态生成 -->
            </div>
        </div>
        
        <!-- 进度可视化 -->
        <div class="status-card">
            <div class="status-header">
                <div class="status-title">

            <div class="task-progress">
                <div class="progress-bar-container" style="height: 20px;">

    <!-- 通知提示 -->
    <div class="notification" id="notification"></div>

    <script>
        // ===== 任务数据 =====
        let tasks = [
            { id: 1, name: '等待用户指令', progress: 0 },
            { id: 2, name: '处理消息', progress: 0 },
            { id: 3, name: '更新监控页面', progress: 0 }
        ];
        
        let activityLog = [];
        let draggedItem = null;
        let dragStartY = 0;
        let dragStartIndex = -1;
        
        // ===== 渲染任务列表 =====
        function renderTasks() {
            const taskList = document.getElementById('taskList');
            
            if (tasks.length === 0) {
                taskList.innerHTML = '<div class="task-empty">🎉 暂无任务</div>';
                updateTotalProgress();
                return;
            }
            
            taskList.innerHTML = tasks.map((task, index) => {
                const progressColor = task.progress < 30 ? '#00ff88' : task.progress < 70 ? '#ffaa00' : '#ff6b6b';
                return `
                    <div class="task-item" data-id="${task.id}" data-index="${index}">
                        <div class="drag-handle">☰</div>
                        <div class="task-header">
                            <div class="task-number">${index + 1}</div>
                            <div class="task-name">${task.name}</div>
                        </div>
                        <div class="task-progress">
                            <div class="progress-bar-container">
                                <div class="task-progress-bar" style="width: ${task.progress}%; background: ${progressColor};"></div>
                            </div>
                            <span class="task-percent" style="color: ${progressColor};">${task.progress}%</span>
                        </div>
                    </div>
                `;
            }).join('');
            
            // 添加拖拽事件监听
            initDragAndDrop();
            updateTotalProgress();
        }
        
        // ===== 拖拽功能 =====
        function initDragAndDrop() {
            const items = document.querySelectorAll('.task-item');
            
            items.forEach(item => {
                // Mouse events
                item.addEventListener('mousedown', handleDragStart);
                item.addEventListener('mousemove', handleDragMove);
                item.addEventListener('mouseup', handleDragEnd);
                item.addEventListener('mouseleave', handleDragEnd);
                
                // Touch events for mobile
                item.addEventListener('touchstart', handleTouchStart, { passive: false });
                item.addEventListener('touchmove', handleTouchMove, { passive: false });
                item.addEventListener('touchend', handleTouchEnd);
            });
            
            // Global mouse move and up
            document.addEventListener('mousemove', handleGlobalMove);
            document.addEventListener('mouseup', handleGlobalEnd);
        }
        
        function handleDragStart(e) {
            if (e.target.classList.contains('drag-handle') || e.target.closest('.drag-handle')) {
                draggedItem = this;
                dragStartIndex = parseInt(this.dataset.index);
                dragStartY = e.clientY;
                this.classList.add('dragging');
                e.preventDefault();
            }
        }
        
        function handleDragMove(e) {
            if (!draggedItem) return;
            
            const currentY = e.clientY;
            const items = document.querySelectorAll('.task-item');
            const draggedRect = draggedItem.getBoundingClientRect();
            
            items.forEach(item => {
                if (item === draggedItem) return;
                
                const rect = item.getBoundingClientRect();
                const midY = rect.top + rect.height / 2;
                
                if (currentY > rect.top && currentY < rect.bottom) {
                    if (currentY < midY) {
                        item.classList.add('drag-over');
                    } else {
                        item.classList.add('drag-over');
                    }
                } else {
                    item.classList.remove('drag-over');
                }
            });
        }
        
        function handleDragEnd(e) {
            if (!draggedItem) return;
            
            const items = document.querySelectorAll('.task-item');
            const currentY = e.clientY;
            let targetIndex = -1;
            
            items.forEach((item, index) => {
                if (item === draggedItem) return;
                
                const rect = item.getBoundingClientRect();
                if (currentY > rect.top && currentY < rect.bottom) {
                    targetIndex = index;
                }
                item.classList.remove('drag-over');
            });
            
            if (targetIndex !== -1 && targetIndex !== dragStartIndex) {
                // 交换任务顺序
                const [movedTask] = tasks.splice(dragStartIndex, 1);
                tasks.splice(targetIndex, 0, movedTask);
                showNotification('✓ 任务顺序已更新', 'success');
            }
            
            if (draggedItem) {
                draggedItem.classList.remove('dragging');
            }
            draggedItem = null;
            dragStartIndex = -1;
            
            renderTasks();
        }
        
        // Touch events for mobile
        function handleTouchStart(e) {
            if (e.target.classList.contains('drag-handle') || e.target.closest('.drag-handle')) {
                draggedItem = this;
                dragStartIndex = parseInt(this.dataset.index);
                const touch = e.touches[0];
                dragStartY = touch.clientY;
                this.classList.add('dragging');
                e.preventDefault();
            }
        }
        
        function handleTouchMove(e) {
            if (!draggedItem) return;
            
            const touch = e.touches[0];
            const currentY = touch.clientY;
            
            const items = document.querySelectorAll('.task-item');
            items.forEach(item => {
                if (item === draggedItem) return;
                
                const rect = item.getBoundingClientRect();
                if (currentY > rect.top && currentY < rect.bottom) {
                    item.classList.add('drag-over');
                } else {
                    item.classList.remove('drag-over');
                }
            });
            
            e.preventDefault();
        }
        
        function handleTouchEnd(e) {
            if (!draggedItem) return;
            
            const touch = e.changedTouches[0];
            const currentY = touch.clientY;
            let targetIndex = -1;
            
            const items = document.querySelectorAll('.task-item');
            items.forEach((item, index) => {
                if (item === draggedItem) return;
                
                const rect = item.getBoundingClientRect();
                if (currentY > rect.top && currentY < rect.bottom) {
                    targetIndex = index;
                }
                item.classList.remove('drag-over');
            });
            
            if (targetIndex !== -1 && targetIndex !== dragStartIndex) {
                const [movedTask] = tasks.splice(dragStartIndex, 1);
                tasks.splice(targetIndex, 0, movedTask);
                showNotification('✓ 任务顺序已更新', 'success');
            }
            
            if (draggedItem) {
                draggedItem.classList.remove('dragging');
            }
            draggedItem = null;
            dragStartIndex = -1;
            
            renderTasks();
        }
        
        function handleGlobalMove(e) {
            if (draggedItem) {
                handleDragMove(e);
            }
        }
        
        function handleGlobalEnd(e) {
            if (draggedItem) {
                handleDragEnd(e);
            }
        }
        
        // ===== 更新总体进度 =====
        function updateTotalProgress() {
            if (tasks.length === 0) {
                document.getElementById('totalProgressBar').style.width = '0%';
                document.getElementById('totalProgressPercent').textContent = '0%';
                return;
            }
            
            const total = tasks.reduce((sum, task) => sum + task.progress, 0);
            const avg = Math.round(total / tasks.length);
            
            const progressBar = document.getElementById('totalProgressBar');
            const percentText = document.getElementById('totalProgressPercent');
            
            progressBar.style.width = avg + '%';
            percentText.textContent = avg + '%';
            
            const color = avg < 30 ? '#00ff88' : avg < 70 ? '#ffaa00' : '#ff6b6b';
            progressBar.style.background = `linear-gradient(90deg, ${color}, ${color}88)`;
            percentText.style.color = color;
        }
        
        // ===== 通知功能 =====
        function showNotification(message, type = 'info') {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.className = 'notification ' + type + ' show';
            
            setTimeout(() => {
                notif.classList.remove('show');
            }, 3000);
        }
        
        // ===== 操作按钮功能 =====
        function compressContext() {
            showNotification('📦 正在压缩上下文...', 'info');
            setTimeout(() => {
                showNotification('✅ 上下文压缩完成', 'success');
                addLog('📦 上下文已压缩');
            }, 1500);
        }
        
        function restartGateway() {
            showNotification('🔄 正在重启网关...', 'info');
            setTimeout(() => {
                showNotification('✅ 网关重启完成', 'success');
                addLog('🔄 网关已重启');
            }, 2000);
        }
        
        function restartOpenClaw() {
            showNotification('🤖 正在重启 OpenClaw...', 'info');
            setTimeout(() => {
                showNotification('✅ OpenClaw 重启完成', 'success');
                addLog('🤖 OpenClaw 已重启');
            }, 2500);
        }
        
        function healthCheck() {
            showNotification('💚 正在检查健康状态...', 'info');
            setTimeout(() => {
                showNotification('✅ 健康检查通过 - 所有系统正常', 'success');
                addLog('💚 健康检查: 正常');
            }, 1000);
        }
        
        // ===== 添加日志 =====
        function addLog(msg) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN');
            activityLog.unshift({ time: timeStr, msg: msg });
            if (activityLog.length > 10) activityLog.pop();
            
            const logContainer = document.getElementById('activityLog');
            logContainer.innerHTML = activityLog.map(log => `
                <div class="log-entry">
                    <span class="log-time">${log.time}</span>
                    <span class="log-msg">${log.msg}</span>
                </div>
            `).join('');
        }
        
        // ===== 刷新状态 =====
        function refreshStatus() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN');
            
            // 模拟更新任务进度
            tasks.forEach((task, i) => {
                if (task.progress > 0 && task.progress < 100) {
                    task.progress = Math.min(100, task.progress + Math.floor(Math.random() * 20));
                } else if (task.progress === 0 && Math.random() > 0.7) {
                    task.progress = Math.floor(Math.random() * 30);
                }
            });
            
            // 更新资源
            const tokens = Math.floor(Math.random() * 30000 + 5000);
            const tokenPercent = Math.min((tokens / 150000) * 100, 100);
            
            document.getElementById('tokenUsage').textContent = tokenPercent.toFixed(1) + '%';
            const tokenProgress = document.getElementById('tokenProgress');
            tokenProgress.style.width = tokenPercent + '%';
            tokenProgress.className = 'progress-fill ' + (tokenPercent < 50 ? 'low' : tokenPercent < 80 ? 'medium' : 'high');
            
            document.getElementById('sessionDuration').textContent = Math.floor(Math.random() * 60 + 10) + ' 分钟';
            document.getElementById('messageCount').textContent = Math.floor(Math.random() * 50 + 5);
            document.getElementById('avgResponseTime').textContent = (Math.random() * 2 + 0.5).toFixed(1) + 's';
            document.getElementById('lastActive').textContent = timeStr;
            
            renderTasks();
            
            const activities = [
                '✅ 等待用户指令...',
                '💬 正在处理消息',
                '🔄 检查系统状态',
                '📊 更新监控数据',
                '✨ 任务执行中'
            ];
            addLog(activities[Math.floor(Math.random() * activities.length)]);
            
            document.getElementById('lastUpdate').textContent = '最后更新: ' + now.toLocaleString('zh-CN');
        }
        
        // ===== 初始化 =====
        renderTasks();
        refreshStatus();
        
        // 每10秒自动刷新
        setInterval(refreshStatus, 10000);
    </script>
</body>
</html>
