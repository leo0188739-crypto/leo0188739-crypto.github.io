<!DOCTYPE html>
<html lang="zh">
<head>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1113273813232585" crossorigin="anonymous"></script>
    <style>
    .lang-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:0.9rem;}

    <meta charset="UTF-8">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { 
            text-align: center; 
            max-width: 500px;
        }
        
        h1 { 
            font-size: 2.5rem; 
            margin-bottom: 20px;
        }
        
        .icon { font-size: 5rem; margin-bottom: 20px; }
        
        p { 
            color: rgba(255,255,255,0.8); 
            margin-bottom: 30px; 
            font-size: 1.1rem;
            line-height: 1.6;
        }
        
        .features {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: left;
        }
        
        .features h3 {
            color: #00ff88;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        
        .features ul {
            list-style: none;
            color: rgba(255,255,255,0.7);
        }
        
        .features li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
        }
        
        .features li::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #00ff88;
        }
        
        .btn {
            display: inline-block;
            padding: 18px 50px;
            background: linear-gradient(135deg, #00ff88, #00d4aa);
            color: #1a1a2e;
            text-decoration: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,255,136,0.3);
        }
        
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .back-btn:hover { color: #00ff88; }
    </style>
</head>
<body>

    <header style="background:rgba(0,0,0,0.3);padding:15px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;">
        <a href="index.html" style="color:#00d9ff;text-decoration:none;font-size:1.2rem;"><span data-en="← Back" data-zh="← 返回">← Back</span></a>
        <button id="langBtn" class="lang-btn" onclick="toggleLang()">EN</button>
    </header>
    <script>
    let currentLang = localStorage.getItem('leo-tools-lang') || 'en';
    function toggleLang() {
        currentLang = currentLang === 'en' ? 'zh' : 'en';
        document.getElementById('langBtn').textContent = currentLang === 'en' ? 'EN' : '中文';
        document.querySelectorAll('[data-en][data-zh]').forEach(el => el.textContent = el.dataset[currentLang]);
        localStorage.setItem('leo-tools-lang', currentLang);
    }
    // Initialize
    document.getElementById('langBtn').textContent = currentLang === 'en' ? 'EN' : '中文';
    document.querySelectorAll('[data-en][data-zh]').forEach(el => el.textContent = el.dataset[currentLang]);
    </script>


    
    <script>
    let currentLang = 'en';
    function toggleLang(btn) {
        currentLang = currentLang === 'en' ? 'zh' : 'en';
        btn.textContent = currentLang === 'en' ? 'EN' : '中文';
        document.querySelectorAll('[data-en][data-zh]').forEach(el => el.textContent = el.dataset[currentLang]);
    }
    </script>

    <div class="container">
        <div class="icon">🖼️</div>
        <h1>背景移除工具</h1>
        
        <div class="features">
            <h3>✨ 功能特点</h3>
            <ul>
                <li>一键自动移除背景</li>
                <li>支持人像、证件照、产品图</li>
                <li>免费提供基础服务</li>
                <li>多种格式下载</li>
            </ul>
        </div>
        
        <a href="https://www.remove.bg/upload" target="_blank" class="btn">
            🚀 打开 remove.bg
        </a>
        
        <br>
        <a href="index.html" class="back-btn">← 返回主页</a>
    </div>
    
    <script>
        // Auto redirect after 2 seconds
        setTimeout(() => {
            window.location.href = 'https://www.remove.bg/upload';
        }, 2000);
    </script>
</body>
</html>
