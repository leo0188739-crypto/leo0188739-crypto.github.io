<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>斗兽棋 - Animal Chess</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #2d5016 0%, #1a3009 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 10px; color: #fff; }
    h1 { margin-bottom: 8px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    .info { margin-bottom: 8px; font-size: 14 flex; gap:px; display: 15px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .mode-select { display: flex; gap: 10px; }
    .mode-select label { cursor: pointer; padding: 6px 12px; border-radius: 15px; background: #34495e; font-size: 12px; }
    .mode-select input { display: none; }
    .mode-select label:has(input:checked) { background: #27ae60; }
    .current-player { padding: 5px 15px; border-radius: 20px; font-weight: bold; }
    .red { background: #e74c3c; }
    .blue { background: #3498db; }
    #board { background: #8B4513; border: 4px solid #5D3A1A; border-radius: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .controls { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    button { padding: 8px 16px; font-size: 13px; border: none; border-radius: 5px; cursor: pointer; transition: all 0.2s; }
    button:hover { transform: translateY(-2px); }
    .btn-reset { background: #e74c3c; color: white; }
    .btn-undo { background: #3498db; color: white; }
    .btn-sound { background: #9b59b6; color: white; }
    .btn-sound.muted { background: #7f8c8d; }
    #winner { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 30px 50px; border-radius: 15px; text-align: center; display: none; z-index: 100; }
    #winner.show { display: block; animation: pop 0.3s ease; }
    @keyframes pop { from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
    #winner h2 { font-size: 28px; margin-bottom: 15px; }
    #winner button { background: #27ae60; color: white; }
    .thinking { color: #f39c12; animation: blink 0.5s infinite; }
    @keyframes blink { 50% { opacity: 0.5; } }
  </style>
</head>
<body>
  <h1>🐘 斗兽棋 🦁</h1>
  <div class="info">
    <div class="mode-select">
      <label><input type="radio" name="mode" value="pvp" onchange="setMode('pvp')"><span>👥 双人对战</span></label>
      <label><input type="radio" name="mode" value="pve" checked onchange="setMode('pve')"><span>🤖 人机对战</span></label>
    </div>
    <span>你执: <span id="humanColor" class="current-player blue">🔵 蓝方</span></span>
    <span>当前: <span id="player" class="current-player blue">🔵 蓝方</span></span>
    <span id="thinking" class="thinking" style="display:none;"> AI思考中...</span>
  </div>
  <canvas id="board"></canvas>
  <div class="controls">
    <button class="btn-undo" onclick="undo()">↩️ 悔棋</button>
    <button class="btn-sound" id="soundBtn" onclick="toggleSound()">🔊 音效</button>
    <button class="btn-reset" onclick="resetGame()">🔄 重新开始</button>
  </div>
  
  <div id="winner">
    <h2 id="winnerText"></h2>
    <button onclick="resetGame()">再玩一局</button>
  </div>

  <script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    
    const COLS = 7;
    const ROWS = 9;
    const CELL_SIZE = 45;
    const BOARD_PADDING = 8;
    
    canvas.width = COLS * CELL_SIZE + BOARD_PADDING * 2;
    canvas.height = ROWS * CELL_SIZE + BOARD_PADDING * 2;
    
    const ANIMAL_ICONS = { 1: '🐭', 2: '🐱', 3: '🐕', 4: '🐺', 5: '🐆', 6: '🐅', 7: '🦁', 8: '🐘' };
    
    const RIVER_ROWS = [3, 4];
    const RED_TRAPS = [[2,1], [2,2], [2,3], [4,1], [4,2], [4,3]];
    const BLUE_TRAPS = [[2,5], [2,6], [2,7], [4,5], [4,6], [4,7]];
    
    let board = [];
    let currentPlayer = 'blue';
    let selectedPiece = null;
    let gameOver = false;
    let history = [];
    let soundEnabled = true;
    let mode = 'pve';
    let humanPlayer = 'blue';
    
    function initBoard() {
      board = [];
      for (let i = 0; i < ROWS; i++) {
        board[i] = [];
        for (let j = 0; j < COLS; j++) board[i][j] = 0;
      }
      
      // 蓝方（上方）- 根据截图
      board[0][0] = 7; // 狮
      board[0][1] = 6; // 虎
      board[0][5] = 6; // 虎
      board[0][6] = 7; // 狮
      board[1][1] = 3; // 狗
      board[1][5] = 3; // 狗
      board[2][0] = 1; // 鼠
      board[2][2] = 4; // 狼
      board[2][4] = 5; // 豹
      board[2][6] = 1; // 鼠
      
      // 红方（下方）
      board[8][0] = 8; // 象
      board[8][1] = 5; // 豹
      board[8][5] = 5; // 豹
      board[8][6] = 8; // 象
      board[7][1] = 4; // 狼
      board[7][5] = 4; // 狼
      board[6][0] = 2; // 猫
      board[6][2] = 3; // 狗
      board[6][4] = 6; // 虎
      board[6][6] = 2; // 猫
      
      currentPlayer = 'blue';
      selectedPiece = null;
      gameOver = false;
      history = [];
      updatePlayerDisplay();
      drawBoard();
      hideWinner();
      
      if (mode === 'pve' && humanPlayer === 'red') {
        setTimeout(aiMove, 500);
      }
    }
    
    function drawBoard() {
      ctx.fillStyle = '#DEB887';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      for (let i = 0; i < ROWS; i++) {
        for (let j = 0; j < COLS; j++) {
          const x = BOARD_PADDING + j * CELL_SIZE;
          const y = BOARD_PADDING + i * CELL_SIZE;
          
          if (RIVER_ROWS.includes(i)) {
            ctx.fillStyle = '#5DADE2';
            ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
          }
          
          if (isTrap(j, i, 'red') || isTrap(j, i, 'blue')) {
            ctx.fillStyle = 'rgba(231, 76, 60, 0.4)';
            ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
          }
          
          if ((j === 3 && i === 0) || (j === 3 && i === 8)) {
            ctx.fillStyle = j === 0 ? 'rgba(52, 152, 219, 0.5)' : 'rgba(231, 76, 60, 0.5)';
            ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
          }
          
          ctx.strokeStyle = '#8B4513';
          ctx.lineWidth = 1;
          ctx.strokeRect(x, y, CELL_SIZE, CELL_SIZE);
        }
      }
      
      for (let i = 0; i < ROWS; i++) {
        for (let j = 0; j < COLS; j++) {
          if (board[i][j] !== 0) drawPiece(j, i, board[i][j]);
        }
      }
      
      if (selectedPiece) {
        const x = BOARD_PADDING + selectedPiece.x * CELL_SIZE + CELL_SIZE / 2;
        const y = BOARD_PADDING + selectedPiece.y * CELL_SIZE + CELL_SIZE / 2;
        ctx.strokeStyle = '#f1c40f';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(x, y, CELL_SIZE / 2 - 5, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
    
    function drawPiece(x, y, animal) {
      const cx = BOARD_PADDING + x * CELL_SIZE + CELL_SIZE / 2;
      const cy = BOARD_PADDING + y * CELL_SIZE + CELL_SIZE / 2;
      const radius = CELL_SIZE / 2 - 4;
      
      const isRed = (y >= 6);
      const isBlue = (y <= 2);
      
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      const gradient = ctx.createRadialGradient(cx - 3, cy - 3, 0, cx, cy, radius);
      
      if (isRed) { gradient.addColorStop(0, '#e74c3c'); gradient.addColorStop(1, '#c0392b'); }
      else if (isBlue) { gradient.addColorStop(0, '#3498db'); gradient.addColorStop(1, '#2980b9'); }
      else { gradient.addColorStop(0, '#95a5a6'); gradient.addColorStop(1, '#7f8c8d'); }
      
      ctx.fillStyle = gradient;
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      ctx.font = '18px Arial';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(ANIMAL_ICONS[animal], cx, cy);
    }
    
    function isTrap(x, y, player) {
      if (player === 'red') return RED_TRAPS.some(t => t[0] === x && t[1] === y);
      return BLUE_TRAPS.some(t => t[0] === x && t[1] === y);
    }
    
    function isRiver(x, y) { return RIVER_ROWS.includes(y); }
    function isDen(x, y, player) { return player === 'red' ? (x === 3 && y === 0) : (x === 3 && y === 8); }
    
    function getPlayer(animal) {
      if (animal === 0) return null;
      for (let i = 0; i < ROWS; i++) {
        for (let j = 0; j < COLS; j++) {
          if (board[i][j] === animal) return i <= 2 ? 'blue' : 'red';
        }
      }
      return null;
    }
    
    function canCapture(fromX, fromY, toX, toY, attacker) {
      const defender = board[toY][toX];
      if (defender === 0) return true;
      
      const attackerPlayer = getPlayer(attacker);
      const defenderPlayer = getPlayer(defender);
      if (attackerPlayer === defenderPlayer) return false;
      
      const attackerRank = attacker;
      const defenderRank = defender;
      
      const defenderInTrap = isTrap(toX, toY, defenderPlayer);
      if (defenderInTrap) return attackerRank <= defenderRank;
      
      if (attackerRank === 1 && defenderRank === 8) return true;
      if (attackerRank > defenderRank) return true;
      if (attackerRank === defenderRank) return true;
      return false;
    }
    
    function canJumpRiver(fromX, fromY, toX, toY, animal) {
      if (animal !== 6 && animal !== 7) return false;
      const player = getPlayer(animal);
      
      if (player === 'blue') {
        for (let i = fromY + 1; i < toY; i++) { if (board[i][fromX] === 1) return false; }
      } else {
        for (let i = fromY - 1; i > toY; i--) { if (board[i][fromX] === 1) return false; }
      }
      return true;
    }
    
    function getValidMoves(x, y) {
      const animal = board[y][x];
      if (animal === 0) return [];
      
      const player = getPlayer(animal);
      const moves = [];
      const directions = [[0,1], [0,-1], [1,0], [-1,0]];
      
      for (const [dx, dy] of directions) {
        const nx = x + dx;
        const ny = y + dy;
        
        if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
        if (isDen(nx, ny, player)) continue;
        
        // 狮虎跳河
        if ((animal === 6 || animal === 7) && !isRiver(x, y) && !isRiver(nx, ny)) {
          if (x === nx) {
            let jumpDist = ny > y ? 2 : -2;
            let jumpY = ny + jumpDist;
            if (jumpY >= 0 && jumpY < ROWS && !isRiver(x, jumpY) && canJumpRiver(x, y, x, jumpY, animal)) {
              const destAnimal = board[jumpY][x];
              if (destAnimal === 0 || canCapture(x, y, x, jumpY, animal)) {
                moves.push({x: x, y: jumpY});
              }
            }
          } else if (y === ny && animal === 6) {
            let jumpX = nx + dx;
            if (jumpX >= 0 && jumpX < COLS && !isRiver(jumpX, ny) && canJumpRiver(x, y, jumpX, ny, animal)) {
              const destAnimal = board[ny][jumpX];
              if (destAnimal === 0 || canCapture(x, y, jumpX, ny, animal)) {
                moves.push({x: jumpX, y: ny});
              }
            }
          }
        }
        
        if (animal !== 1 && isRiver(nx, ny)) continue;
        
        const destAnimal = board[ny][nx];
        if (destAnimal === 0 || canCapture(x, y, nx, ny, animal)) {
          moves.push({x: nx, y: ny});
        }
      }
      return moves;
    }
    
    canvas.addEventListener('click', (e) => {
      if (gameOver) return;
      if (mode === 'pve' && currentPlayer !== humanPlayer) return;
      
      const rect = canvas.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left - BOARD_PADDING) / CELL_SIZE);
      const y = Math.floor((e.clientY - rect.top - BOARD_PADDING) / CELL_SIZE);
      
      if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return;
      
      const clickedAnimal = board[y][x];
      const clickedPlayer = getPlayer(clickedAnimal);
      
      if (clickedPlayer === currentPlayer) {
        selectedPiece = { x, y };
        drawBoard();
        const moves = getValidMoves(x, y);
        ctx.fillStyle = 'rgba(46, 204, 113, 0.6)';
        for (const m of moves) {
          const mx = BOARD_PADDING + m.x * CELL_SIZE + CELL_SIZE / 2;
          const my = BOARD_PADDING + m.y * CELL_SIZE + CELL_SIZE / 2;
          ctx.beginPath(); ctx.arc(mx, my, 8, 0, Math.PI * 2); ctx.fill();
        }
        return;
      }
      
      if (selectedPiece) {
        const moves = getValidMoves(selectedPiece.x, selectedPiece.y);
        const validMove = moves.find(m => m.x === x && m.y === y);
        
        if (validMove) {
          movePiece(selectedPiece.x, selectedPiece.y, x, y);
        } else {
          selectedPiece = null;
          drawBoard();
        }
      }
    });
    
    function movePiece(fromX, fromY, toX, toY) {
      history.push({ from: {x: fromX, y: fromY}, to: {x: toX, y: toY}, captured: board[toY][toX], player: currentPlayer });
      
      board[toY][toX] = board[fromY][fromX];
      board[fromY][fromX] = 0;
      
      playSound('place');
      
      if (checkWin(toX, toY)) {
        gameOver = true;
        showWinner(currentPlayer);
        drawBoard();
        return;
      }
      
      currentPlayer = currentPlayer === 'red' ? 'blue' : 'red';
      selectedPiece = null;
      updatePlayerDisplay();
      drawBoard();
      
      if (mode === 'pve' && currentPlayer !== humanPlayer && !gameOver) {
        document.getElementById('thinking').style.display = 'inline';
        canvas.style.cursor = 'wait';
        setTimeout(aiMove, 800);
      }
    }
    
    function checkWin(x, y) {
      if (isDen(x, y, currentPlayer === 'red' ? 'blue' : 'red')) return true;
      const opponent = currentPlayer === 'red' ? 'blue' : 'red';
      for (let i = 0; i < ROWS; i++) {
        for (let j = 0; j < COLS; j++) {
          if (getPlayer(board[i][j]) === opponent) return false;
        }
      }
      return true;
    }
    
    function aiMove() {
      if (gameOver) return;
      
      const aiPlayer = humanPlayer === 'blue' ? 'red' : 'blue';
      
      // 找所有可移动的棋子
      let allMoves = [];
      for (let i = 0; i < ROWS; i++) {
        for (let j = 0; j < COLS; j++) {
          if (getPlayer(board[i][j]) === aiPlayer) {
            const moves = getValidMoves(j, i);
            for (const m of moves) {
              allMoves.push({ fromX: j, fromY: i, toX: m.x, toY: m.y });
            }
          }
        }
      }
      
      if (allMoves.length === 0) {
        // AI无棋可走，人类获胜
        gameOver = true;
        showWinner(humanPlayer);
        drawBoard();
        return;
      }
      
      // 简单AI：随机选择一步
      const move = allMoves[Math.floor(Math.random() * allMoves.length)];
      movePiece(move.fromX, move.fromY, move.toX, move.toY);
      
      document.getElementById('thinking').style.display = 'none';
      canvas.style.cursor = 'pointer';
    }
    
    function updatePlayerDisplay() {
      const playerEl = document.getElementById('player');
      if (currentPlayer === 'red') {
        playerEl.textContent = '🔴 红方';
        playerEl.className = 'current-player red';
      } else {
        playerEl.textContent = '🔵 蓝方';
        playerEl.className = 'current-player blue';
      }
    }
    
    function showWinner(player) {
      const winnerText = document.getElementById('winnerText');
      if (mode === 'pve') {
        winnerText.textContent = player === humanPlayer ? '🎉 你赢了!' : '😢 AI赢了...';
      } else {
        winnerText.textContent = player === 'red' ? '🎉 红方获胜!' : '🎉 蓝方获胜!';
      }
      document.getElementById('winner').classList.add('show');
      playSound('win');
    }
    
    function hideWinner() { document.getElementById('winner').classList.remove('show'); }
    
    function playSound(type) {
      if (!soundEnabled) return;
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      if (type === 'place') {
        [250, 350, 450].forEach((freq, i) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain); gain.connect(audioCtx.destination);
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
          osc.start(audioCtx.currentTime + i * 0.01);
          osc.stop(audioCtx.currentTime + 0.1);
        });
      } else if (type === 'win') {
        [523, 659, 784, 1047].forEach((freq, i) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain); gain.connect(audioCtx.destination);
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.15);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.3);
          osc.start(audioCtx.currentTime + i * 0.15);
          osc.stop(audioCtx.currentTime + i * 0.15 + 0.3);
        });
      }
    }
    
    function toggleSound() {
      soundEnabled = !soundEnabled;
      document.getElementById('soundBtn').textContent = soundEnabled ? '🔊 音效' : '🔇 静音';
      document.getElementById('soundBtn').classList.toggle('muted', !soundEnabled);
    }
    
    function undo() {
      if (history.length === 0 || gameOver) return;
      
      if (mode === 'pve' && history.length >= 2) {
        const m1 = history.pop();
        const m2 = history.pop();
        board[m1.from.y][m1.from.x] = board[m1.to.y][m1.to.x];
        board[m1.to.y][m1.to.x] = m1.captured;
        board[m2.from.y][m2.from.x] = board[m2.to.y][m2.to.x];
        board[m2.to.y][m2.to.x] = m2.captured;
        currentPlayer = m2.player;
      } else if (history.length >= 1) {
        const m = history.pop();
        board[m.from.y][m.from.x] = board[m.to.y][m.to.x];
        board[m.to.y][m.to.x] = m.captured;
        currentPlayer = m.player;
      }
      
      updatePlayerDisplay();
      drawBoard();
    }
    
    function setMode(newMode) {
      mode = newMode;
      if (mode === 'pve') {
        document.getElementById('humanColor').textContent = '🔵 蓝方';
        document.getElementById('humanColor').className = 'current-player blue';
        humanPlayer = 'blue';
      }
      resetGame();
    }
    
    function resetGame() { initBoard(); }
    
    initBoard();
  </script>
</body>
</html>
