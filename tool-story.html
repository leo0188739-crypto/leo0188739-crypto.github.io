<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Telling - Leo Tools</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1113273813232585"
     crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        header {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .header-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { font-size: 1.5rem; }
        h1 a { color: #00d9ff; text-decoration: none; }
        .lang-group { display: flex; gap: 10px; }
        .lang-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .lang-btn.active { background: #00d9ff; color: #1a1a2e; }
        
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h2 { margin-bottom: 10px; }
        .description { color: #aaa; margin-bottom: 30px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn {
            flex: 1; padding: 15px; border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px; background: rgba(255,255,255,0.05); color: #fff;
            font-size: 1rem; cursor: pointer;
        }
        .tab-btn.active { border-color: #00d9ff; background: rgba(0,217,255,0.2); }
        
        .form-section { display: none; }
        .form-section.active { display: block; }
        
        .upload-section {
            background: rgba(255,255,255,0.05);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 16px; padding: 40px; text-align: center; margin-bottom: 20px;
        }
        .upload-btn {
            background: linear-gradient(135deg, #00d9ff 0%, #00aaff 100%);
            color: #1a1a2e; padding: 15px 30px; border: none;
            border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
        }
        
        .selected-file { margin-bottom: 20px; padding: 15px; background: rgba(0,217,255,0.1); border-radius: 10px; display: none; }
        
        .name-input, .text-input {
            width: 100%; padding: 15px; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px; background: rgba(255,255,255,0.1); color: #fff;
            font-size: 1rem; margin-bottom: 20px;
        }
        .name-input::placeholder, .text-input::placeholder { color: #666; }
        .text-input { min-height: 150px; resize: vertical; }
        
        .submit-btn {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .submit-btn.upload-style { background: linear-gradient(135deg, #00d9ff 0%, #00aaff 100%); color: #1a1a2e; }
        .submit-btn.gen-style { background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%); color: #fff; }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .stories-list { margin-top: 40px; }
        .stories-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .sync-btn { padding: 8px 15px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-size: 0.9rem; }
        
        .story-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .story-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .story-name { font-size: 1.1rem; font-weight: bold; color: #00d9ff; }
        .story-type { font-size: 0.8rem; padding: 4px 10px; border-radius: 20px; background: rgba(0,217,255,0.2); color: #00d9ff; }
        
        .play-controls { display: flex; gap: 10px; flex-wrap: wrap; }
        .play-btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
        .play-btn.main { background: linear-gradient(135deg, #00d9ff 0%, #00aaff 100%); color: #1a1a2e; }
        .play-btn.pause { background: rgba(241,196,15,0.3); color: #f1c40f; }
        .play-btn.stop { background: rgba(255,71,87,0.3); color: #ff4757; }
        
        .empty-state { text-align: center; color: #666; padding: 40px; }
        .ad-section { margin-top: 40px; text-align: center; }
        .loading { text-align: center; color: #00d9ff; padding: 20px; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1><a href="index.html">← 🛠️ Leo Tools</a></h1>
            <div class="lang-group">
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="zh">中文</button>
            </div>
        </div>
    </header>
    
    <div class="container">
        <h2 data-en="📖 Story Telling" data-zh="📖 讲故事">📖 Story Telling</h2>
        
        <p class="description" data-en="Upload audio files to cloud. Works on ANY network - no local server needed!"
           data-zh="上传音频文件到云端。任意网络均可使用！">
        </p>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="audio" onclick="switchTab('audio')">
                🎵 <span data-en="Upload Audio" data-zh="上传音频">Upload Audio</span>
            </button>
        </div>
        
        <div class="form-section active" id="audioSection">
            <div class="upload-section">
                <input type="file" id="audioFileInput" accept="audio/*,.wav,.mp3,.m4a,.aac,.ogg">
                <button class="upload-btn" onclick="document.getElementById('audioFileInput').click()">
                    🎤 <span data-en="Select Audio File" data-zh="选择音频文件">Select Audio File</span>
                </button>
            </div>
            
            <div class="selected-file" id="audioFileDisplay">
                <span style="color: #00d9ff;">📎</span> <span id="audioFileName"></span>
            </div>
            
            <input type="text" id="audioStoryName" class="name-input" 
                   placeholder="Enter story name..." 
                   data-en-placeholder="Enter story name..."
                   data-zh-placeholder="输入故事名称...">
            
            <button class="submit-btn upload-style" onclick="saveAudioStory()">
                ☁️ <span data-en="Upload to Cloud" data-zh="上传到云端">Upload to Cloud</span>
            </button>
        </div>
        
        <div class="stories-list">
            <div class="stories-header">
                <h3 class="stories-title" data-en="My Stories (Cloud Synced)" data-zh="我的故事 (云同步)">My Stories (Cloud Synced)</h3>
                <button class="sync-btn" onclick="loadStories()">
                    🔄 <span data-en="Sync" data-zh="同步">Sync</span>
                </button>
            </div>
            <div id="storiesContainer">
                <p class="loading">Loading stories...</p>
            </div>
        </div>
        
        <div class="ad-section">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1113273813232585" data-ad-slot="1234567890" data-ad-format="auto" data-full-width-responsive="true"></ins>
        </div>
    </div>
    
    <script>
        // Cloud storage configuration - using file.io
        // Stories are stored in localStorage for now (sync via GitHub Pages)
        let currentAudio = null;
        let selectedAudioFile = null;
        
        // Language
        const langBtns = document.querySelectorAll('.lang-btn');
        let currentLang = localStorage.getItem('leo-tools-lang') || 'en';
        
        function updateLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-en][data-zh]').forEach(el => el.textContent = el.dataset[lang]);
            document.querySelectorAll('[data-en-placeholder][data-zh-placeholder]').forEach(el => el.placeholder = el.dataset[lang + '-placeholder']);
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
            localStorage.setItem('leo-tools-lang', lang);
        }
        
        langBtns.forEach(btn => btn.addEventListener('click', () => updateLanguage(btn.dataset.lang)));
        const savedLang = localStorage.getItem('leo-tools-lang') || 'en';
        document.querySelector(`.lang-btn[data-lang="${savedLang}"]`).click();
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
            document.getElementById(tab + 'Section').classList.add('active');
        }
        
        // Audio Upload
        const audioFileInput = document.getElementById('audioFileInput');
        audioFileInput.addEventListener('change', handleAudioFile);
        
        function handleAudioFile(e) {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('audio/')) {
                alert(currentLang === 'en' ? 'Please select an audio file!' : '请选择音频文件！');
                return;
            }
            selectedAudioFile = file;
            document.getElementById('audioFileName').textContent = file.name;
            document.getElementById('audioFileDisplay').style.display = 'block';
        }
        
        // Upload to file.io (free, no auth needed, works from any network)
        async function uploadToCloud(file) {
            const formData = new FormData();
            formData.append('file', file);
            
            const response = await fetch('https://file.io', {
                method: 'POST',
                body: formData
            });
            
            const result = await response.json();
            
            if (!result.success) {
                throw new Error('Upload failed');
            }
            
            return result;
        }
        
        // Save audio story
        async function saveAudioStory() {
            const name = document.getElementById('audioStoryName').value.trim();
            
            if (!selectedAudioFile) {
                alert(currentLang === 'en' ? 'Please upload an audio file!' : '请上传音频文件！');
                return;
            }
            if (!name) {
                alert(currentLang === 'en' ? 'Please enter a story name!' : '请输入故事名称！');
                return;
            }
            
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '⏳ ' + (currentLang === 'en' ? 'Uploading...' : '上传中...');
            
            try {
                // Upload to file.io
                const result = await uploadToCloud(selectedAudioFile);
                
                // Save to local stories (for now)
                const story = {
                    id: Date.now().toString(36),
                    name: name,
                    url: result.link,
                    type: 'audio',
                    createdAt: new Date().toISOString()
                };
                
                // Get existing stories
                let stories = JSON.parse(localStorage.getItem('leo-stories') || '[]');
                stories.unshift(story);
                localStorage.setItem('leo-stories', JSON.stringify(stories));
                
                alert(currentLang === 'en' ? 'Story uploaded successfully!' : '故事上传成功！');
                resetAudioForm();
                loadStories();
            } catch (err) {
                console.error(err);
                alert(currentLang === 'en' ? 'Upload failed: ' + err.message : '上传失败：' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '☁️ ' + (currentLang === 'en' ? 'Upload to Cloud' : '上传到云端');
            }
        }
        
        function resetAudioForm() {
            selectedAudioFile = null;
            audioFileInput.value = '';
            document.getElementById('audioFileDisplay').style.display = 'none';
            document.getElementById('audioStoryName').value = '';
        }
        
        // Load Stories from localStorage
        function loadStories() {
            const container = document.getElementById('storiesContainer');
            
            let stories = JSON.parse(localStorage.getItem('leo-stories') || '[]');
            
            if (stories.length === 0) {
                container.innerHTML = `<p class="empty-state" data-en="No stories yet. Upload your first story!" data-zh="还没有故事。上传你的第一个故事！">No stories yet</p>`;
                return;
            }
            
            container.innerHTML = stories.map(story => `
                <div class="story-card">
                    <div class="story-header">
                        <span class="story-name">${story.name}</span>
                        <span class="story-type">🎵 Audio</span>
                    </div>
                    <div class="play-controls">
                        <button class="play-btn main" onclick="playStory('${story.url}')">
                            ▶ <span data-en="Play" data-zh="播放">Play</span>
                        </button>
                        <button class="play-btn pause" onclick="pauseStory()">
                            ⏸ <span data-en="Pause" data-zh="暂停">Pause</span>
                        </button>
                        <button class="play-btn stop" onclick="stopStory()">
                            ⏹ <span data-en="Stop" data-zh="停止">Stop</span>
                        </button>
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('[data-en][data-zh]').forEach(el => el.textContent = el.dataset[currentLang]);
        }
        
        function playStory(url) {
            if (currentAudio) currentAudio.pause();
            currentAudio = new Audio(url);
            currentAudio.play();
        }
        
        function pauseStory() {
            if (currentAudio) currentAudio.pause();
        }
        
        function stopStory() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
        }
        
        (adsbygoogle = window.adsbygoogle || []).push({});
        loadStories();
    </script>
</body>
</html>
