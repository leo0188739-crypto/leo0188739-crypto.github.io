<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Telling - Leo Tools</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1113273813232585"
     crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        header {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .header-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { font-size: 1.5rem; }
        h1 a { color: #00d9ff; text-decoration: none; }
        .lang-group { display: flex; gap: 10px; }
        .lang-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .lang-btn:hover { background: rgba(255,255,255,0.2); }
        .lang-btn.active { background: #00d9ff; color: #1a1a2e; }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h2 { margin-bottom: 10px; }
        .description { color: #aaa; margin-bottom: 30px; }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn:hover { background: rgba(255,255,255,0.1); }
        .tab-btn.active {
            border-color: #00d9ff;
            background: rgba(0,217,255,0.2);
        }
        
        .form-section { display: none; }
        .form-section.active { display: block; }
        
        .upload-section {
            background: rgba(255,255,255,0.05);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .upload-section:hover { border-color: #00d9ff; }
        
        .upload-btn {
            background: linear-gradient(135deg, #00d9ff 0%, #00aaff 100%);
            color: #1a1a2e;
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-btn:hover { transform: scale(1.05); }
        
        .file-input { display: none; }
        
        .selected-file {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0,217,255,0.1);
            border-radius: 10px;
            display: none;
        }
        
        .name-input, .text-input {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
            margin-bottom: 20px;
        }
        .name-input::placeholder, .text-input::placeholder { color: #666; }
        .name-input:focus, .text-input:focus { outline: none; border-color: #00d9ff; }
        .text-input { min-height: 150px; resize: vertical; }
        
        .lang-select {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .lang-select option { background: #1a1a2e; }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .submit-btn.upload-style {
            background: linear-gradient(135deg, #00d9ff 0%, #00aaff 100%);
            color: #1a1a2e;
        }
        .submit-btn.gen-style {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
            color: #fff;
        }
        .submit-btn:hover { transform: translateY(-2px); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .stories-list { margin-top: 40px; }
        .stories-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .sync-btn {
            padding: 8px 15px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .sync-btn:hover { background: rgba(255,255,255,0.2); }
        
        .story-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .story-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .story-name { font-size: 1.1rem; font-weight: bold; color: #00d9ff; }
        .story-type { 
            font-size: 0.8rem; 
            padding: 4px 10px; 
            border-radius: 20px; 
            background: rgba(155,89,182,0.3);
            color: #bb8fce;
        }
        .story-type.audio { background: rgba(0,217,255,0.2); color: #00d9ff; }
        .story-content {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 15px;
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .play-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .play-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .play-btn.main {
            background: linear-gradient(135deg, #00d9ff 0%, #00aaff 100%);
            color: #1a1a2e;
        }
        .play-btn.pause {
            background: rgba(241,196,15,0.3);
            color: #f1c40f;
            border: 1px solid rgba(241,196,15,0.5);
        }
        .play-btn.stop {
            background: rgba(255,71,87,0.3);
            color: #ff4757;
            border: 1px solid rgba(255,71,87,0.5);
        }
        .play-btn.delete {
            background: rgba(255,71,87,0.2);
            color: #ff4757;
            margin-left: auto;
        }
        .play-btn:hover { transform: translateY(-2px); }
        
        .empty-state { text-align: center; color: #666; padding: 40px; }
        .ad-section { margin-top: 40px; text-align: center; }
        
        .loading {
            text-align: center;
            color: #00d9ff;
            padding: 20px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1><a href="index.html">← 🛠️ Leo Tools</a></h1>
            <div class="lang-group">
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="zh">中文</button>
            </div>
        </div>
    </header>
    
    <div class="container">
        <h2 data-en="📖 Story Telling" data-zh="📖 讲故事">📖 Story Telling</h2>
        
        <p class="description" data-en="Upload audio files or generate from text. Stories sync across all devices via GitHub."
           data-zh="上传音频文件或从文字生成。故事通过 GitHub 在所有设备间同步。">
        </p>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="audio" onclick="switchTab('audio')">
                🎵 <span data-en="Upload Audio" data-zh="上传音频">Upload Audio</span>
            </button>
            <button class="tab-btn" data-tab="text" onclick="switchTab('text')">
                ✨ <span data-en="Generate from Text" data-zh="文字生成">Generate from Text</span>
            </button>
        </div>
        
        <div class="form-section active" id="audioSection">
            <div class="upload-section" id="uploadSection">
                <input type="file" id="audioFileInput" class="file-input" accept="audio/*">
                <button class="upload-btn" onclick="document.getElementById('audioFileInput').click()">
                    🎤 <span data-en="Select Audio File" data-zh="选择音频文件">Select Audio File</span>
                </button>
            </div>
            
            <div class="selected-file" id="audioFileDisplay">
                <span style="color: #00d9ff;">📎</span> <span id="audioFileName"></span>
            </div>
            
            <input type="text" id="audioStoryName" class="name-input" 
                   placeholder="Enter story name..." 
                   data-en-placeholder="Enter story name..."
                   data-zh-placeholder="输入故事名称...">
            
            <button class="submit-btn upload-style" onclick="saveAudioStory()">
                ☁️ <span data-en="Upload to Cloud" data-zh="上传到云端">Upload to Cloud</span>
            </button>
        </div>
        
        <div class="form-section" id="textSection">
            <input type="text" id="textStoryName" class="name-input" 
                   placeholder="Story title..." 
                   data-en-placeholder="Story title..."
                   data-zh-placeholder="故事标题...">
            
            <textarea id="textContent" class="text-input" 
                      placeholder="Enter story content..." 
                      data-en-placeholder="Enter story content..."
                      data-zh-placeholder="输入故事内容..."></textarea>
            
            <select id="voiceLang" class="lang-select">
                <option value="zh">🇨🇳 中文</option>
                <option value="en">🇺🇸 English</option>
                <option value="fi">🇫🇮 Suomi</option>
                <option value="ja">🇯🇵 日本語</option>
                <option value="ko">🇰🇷 한국어</option>
            </select>
            
            <button class="submit-btn gen-style" onclick="generateTextStory()">
                ✨ <span data-en="Generate & Upload" data-zh="生成并上传">Generate & Upload</span>
            </button>
        </div>
        
        <div class="stories-list">
            <div class="stories-header">
                <h3 class="stories-title" data-en="My Stories (Synced)" data-zh="我的故事 (已同步)">My Stories (Synced)</h3>
                <button class="sync-btn" onclick="loadStories()">
                    🔄 <span data-en="Sync" data-zh="同步">Sync</span>
                </button>
            </div>
            <div id="storiesContainer">
                <p class="loading">Loading stories...</p>
            </div>
        </div>
        
        <div class="ad-section">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-1113273813232585"
                 data-ad-slot="1234567890"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
        </div>
    </div>
    
    <script>
        // Current playing audio
        let currentAudio = null;
        let currentStoryId = null;
        
        // Language
        const langBtns = document.querySelectorAll('.lang-btn');
        let currentLang = localStorage.getItem('leo-tools-lang') || 'en';
        
        function updateLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-en][data-zh]').forEach(el => {
                el.textContent = el.dataset[lang];
            });
            document.querySelectorAll('[data-en-placeholder][data-zh-placeholder]').forEach(el => {
                el.placeholder = el.dataset[lang + '-placeholder'];
            });
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
            document.documentElement.lang = lang;
            localStorage.setItem('leo-tools-lang', lang);
        }
        
        langBtns.forEach(btn => {
            btn.addEventListener('click', () => updateLanguage(btn.dataset.lang));
        });
        
        const savedLang = localStorage.getItem('leo-tools-lang') || 'en';
        document.querySelector(`.lang-btn[data-lang="${savedLang}"]`).click();
        
        // Tab Switching
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
            document.getElementById(tab + 'Section').classList.add('active');
        }
        
        // Audio Upload
        let selectedAudioFile = null;
        let audioFileUrl = null;
        
        const audioFileInput = document.getElementById('audioFileInput');
        
        audioFileInput.addEventListener('change', handleAudioFile);
        
        function handleAudioFile(e) {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('audio/')) {
                alert(currentLang === 'en' ? 'Please select an audio file!' : '请选择音频文件！');
                return;
            }
            selectedAudioFile = file;
            document.getElementById('audioFileName').textContent = file.name;
            document.getElementById('audioFileDisplay').style.display = 'block';
            if (audioFileUrl) URL.revokeObjectURL(audioFileUrl);
            audioFileUrl = URL.createObjectURL(file);
        }
        
        // Save Audio Story to GitHub
        async function saveAudioStory() {
            const name = document.getElementById('audioStoryName').value.trim();
            
            if (!selectedAudioFile) {
                alert(currentLang === 'en' ? 'Please upload an audio file!' : '请上传音频文件！');
                return;
            }
            if (!name) {
                alert(currentLang === 'en' ? 'Please enter a story name!' : '请输入故事名称！');
                return;
            }
            
            // Convert audio to base64
            const reader = new FileReader();
            reader.onload = async function() {
                const base64 = reader.result.split(',')[1];
                
                try {
                    const response = await fetch('http://localhost:3000/upload-story', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            name: name,
                            audio: base64,
                            type: 'audio'
                        })
                    });
                    
                    const data = await response.json();
                    if (data.success) {
                        alert(currentLang === 'en' ? 'Story uploaded to cloud!' : '故事已上传到云端！');
                        resetAudioForm();
                        loadStories();
                    } else {
                        throw new Error(data.error);
                    }
                } catch (err) {
                    console.error(err);
                    alert(currentLang === 'en' ? 'Upload failed!' : '上传失败！');
                }
            };
            reader.readAsDataURL(selectedAudioFile);
        }
        
        function resetAudioForm() {
            selectedAudioFile = null;
            audioFileUrl = null;
            document.getElementById('audioFileInput').value = '';
            document.getElementById('audioFileDisplay').style.display = 'none';
            document.getElementById('audioStoryName').value = '';
        }
        
        // Generate Text Story
        async function generateTextStory() {
            const name = document.getElementById('textStoryName').value.trim();
            const content = document.getElementById('textContent').value.trim();
            const lang = document.getElementById('voiceLang').value;
            
            if (!name) {
                alert(currentLang === 'en' ? 'Please enter a story title!' : '请输入故事标题！');
                return;
            }
            if (!content) {
                alert(currentLang === 'en' ? 'Please enter story content!' : '请输入故事内容！');
                return;
            }
            
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '⏳ ' + (currentLang === 'en' ? 'Generating & Uploading...' : '生成并上传中...');
            
            try {
                // Generate TTS
                const fullText = name + '。' + content;
                const ttsRes = await fetch('http://localhost:3000/speak', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text: fullText, language: lang})
                });
                
                const ttsData = await ttsRes.json();
                
                if (ttsData.success) {
                    // Upload to GitHub
                    const uploadRes = await fetch('http://localhost:3000/upload-story', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            name: name,
                            audio: ttsData.audio,
                            type: 'tts'
                        })
                    });
                    
                    const uploadData = await uploadRes.json();
                    
                    if (uploadData.success) {
                        alert(currentLang === 'en' ? 'Story generated and uploaded!' : '故事生成并上传成功！');
                        resetTextForm();
                        loadStories();
                    } else {
                        throw new Error(uploadData.error);
                    }
                } else {
                    throw new Error(ttsData.error);
                }
            } catch (err) {
                console.error(err);
                alert(currentLang === 'en' ? 'Generation failed!' : '生成失败！');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '✨ ' + (currentLang === 'en' ? 'Generate & Upload' : '生成并上传');
            }
        }
        
        function resetTextForm() {
            document.getElementById('textStoryName').value = '';
            document.getElementById('textContent').value = '';
        }
        
        // Load Stories from GitHub
        async function loadStories() {
            const container = document.getElementById('storiesContainer');
            container.innerHTML = '<p class="loading">🔄 Syncing...</p>';
            
            try {
                const response = await fetch('https://leo0188739-crypto.github.io/audio-stories/stories.json');
                const stories = await response.json();
                renderStories(stories);
            } catch (err) {
                console.error(err);
                container.innerHTML = `<p class="empty-state" data-en="Failed to load stories"
                       data-zh="加载故事失败">Failed to load stories</p>`;
            }
        }
        
        function renderStories(stories) {
            const container = document.getElementById('storiesContainer');
            
            if (!stories || stories.length === 0) {
                container.innerHTML = `<p class="empty-state" data-en="No stories yet. Create your first story!"
                       data-zh="还没有故事。创建你的第一个故事！">
                    No stories yet. Create your first story!
                </p>`;
                return;
            }
            
            container.innerHTML = stories.map(story => `
                <div class="story-card">
                    <div class="story-header">
                        <span class="story-name">${story.name}</span>
                        <span class="story-type ${story.type}">
                            ${story.type === 'audio' ? '🎵 Audio' : '✨ TTS'}
                        </span>
                    </div>
                    <div class="play-controls" id="controls-${story.id}">
                        <button class="play-btn main" onclick="playStory('${story.id}', '${story.url}')">
                            ▶ <span data-en="Play" data-zh="播放">Play</span>
                        </button>
                        <button class="play-btn pause" onclick="pauseStory()">
                            ⏸ <span data-en="Pause" data-zh="暂停">Pause</span>
                        </button>
                        <button class="play-btn stop" onclick="stopStory()">
                            ⏹ <span data-en="Stop" data-zh="停止">Stop</span>
                        </button>
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('[data-en][data-zh]').forEach(el => {
                el.textContent = el.dataset[currentLang];
            });
        }
        
        function playStory(storyId, url) {
            // Stop current if playing
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            
            currentStoryId = storyId;
            currentAudio = new Audio(url);
            currentAudio.play();
        }
        
        function pauseStory() {
            if (currentAudio) {
                currentAudio.pause();
            }
        }
        
        function stopStory() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio = null;
            }
        }
        
        // Load ads
        (adsbygoogle = window.adsbygoogle || []).push({});
        
        // Initial load
        loadStories();
    </script>
</body>
</html>
