<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Telling - Leo Tools</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1113273813232585"
     crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        header {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .header-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { font-size: 1.5rem; }
        h1 a { color: #00d9ff; text-decoration: none; }
        .lang-group { display: flex; gap: 10px; }
        .lang-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .lang-btn:hover { background: rgba(255,255,255,0.2); }
        .lang-btn.active { background: #00d9ff; color: #1a1a2e; }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h2 { margin-bottom: 10px; }
        .description { color: #aaa; margin-bottom: 30px; }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn:hover { background: rgba(255,255,255,0.1); }
        .tab-btn.active {
            border-color: #00d9ff;
            background: rgba(0,217,255,0.2);
        }
        
        /* Form Sections */
        .form-section { display: none; }
        .form-section.active { display: block; }
        
        /* Upload Section */
        .upload-section {
            background: rgba(255,255,255,0.05);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .upload-section:hover { border-color: #00d9ff; }
        
        .upload-btn {
            background: linear-gradient(135deg, #00d9ff 0%, #00aaff 100%);
            color: #1a1a2e;
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-btn:hover { transform: scale(1.05); }
        
        .file-input { display: none; }
        
        .selected-file {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0,217,255,0.1);
            border-radius: 10px;
            display: none;
        }
        
        .name-input {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
            margin-bottom: 20px;
        }
        .name-input::placeholder { color: #666; }
        .name-input:focus { outline: none; border-color: #00d9ff; }
        
        /* Text Input Section */
        .text-input {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
            min-height: 150px;
            resize: vertical;
            margin-bottom: 20px;
        }
        .text-input::placeholder { color: #666; }
        .text-input:focus { outline: none; border-color: #00d9ff; }
        
        /* Language Select */
        .lang-select {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .lang-select option { background: #1a1a2e; }
        
        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .submit-btn.upload-style {
            background: linear-gradient(135deg, #00d9ff 0%, #00aaff 100%);
            color: #1a1a2e;
        }
        .submit-btn.gen-style {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
            color: #fff;
        }
        .submit-btn:hover { transform: translateY(-2px); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        /* Stories List */
        .stories-list { margin-top: 40px; }
        .stories-title { margin-bottom: 15px; color: #aaa; }
        
        .story-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .story-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .story-name { font-size: 1.1rem; font-weight: bold; color: #00d9ff; }
        .story-type { 
            font-size: 0.8rem; 
            padding: 4px 10px; 
            border-radius: 20px; 
            background: rgba(155,89,182,0.3);
            color: #bb8fce;
        }
        .story-type.audio { background: rgba(0,217,255,0.2); color: #00d9ff; }
        .story-content {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 15px;
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .play-btns { display: flex; gap: 10px; flex-wrap: wrap; }
        .play-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .play-btn.main {
            background: linear-gradient(135deg, #00d9ff 0%, #00aaff 100%);
            color: #1a1a2e;
        }
        .play-btn.delete {
            background: rgba(255,71,87,0.2);
            color: #ff4757;
        }
        .play-btn:hover { transform: translateY(-2px); }
        
        .empty-state { text-align: center; color: #666; padding: 40px; }
        
        .ad-section { margin-top: 40px; text-align: center; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1><a href="index.html">← 🛠️ Leo Tools</a></h1>
            <div class="lang-group">
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="zh">中文</button>
            </div>
        </div>
    </header>
    
    <div class="container">
        <h2 data-en="📖 Story Telling" data-zh="📖 讲故事">📖 Story Telling</h2>
        
        <p class="description" data-en="Save audio files as stories, or generate TTS audio from text."
           data-zh="将音频文件保存为故事，或从文字生成 TTS 音频。">
        </p>
        
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="audio" onclick="switchTab('audio')">
                🎵 <span data-en="Upload Audio" data-zh="上传音频">Upload Audio</span>
            </button>
            <button class="tab-btn" data-tab="text" onclick="switchTab('text')">
                ✨ <span data-en="Generate from Text" data-zh="文字生成">Generate from Text</span>
            </button>
        </div>
        
        <!-- Tab 1: Upload Audio -->
        <div class="form-section active" id="audioSection">
            <div class="upload-section" id="uploadSection">
                <input type="file" id="audioFileInput" class="file-input" accept="audio/*">
                <button class="upload-btn" onclick="document.getElementById('audioFileInput').click()">
                    🎤 <span data-en="Select Audio File" data-zh="选择音频文件">Select Audio File</span>
                </button>
                <p style="margin-top: 15px; color: #888;" data-en="Or drag and drop here" data-zh="或拖拽到此处">
                    Or drag and drop here
                </p>
            </div>
            
            <div class="selected-file" id="audioFileDisplay">
                <span style="color: #00d9ff;">📎</span> <span id="audioFileName"></span>
            </div>
            
            <input type="text" id="audioStoryName" class="name-input" 
                   placeholder="Enter story name..." 
                   data-en-placeholder="Enter story name..."
                   data-zh-placeholder="输入故事名称...">
            
            <button class="submit-btn upload-style" onclick="saveAudioStory()">
                💾 <span data-en="Save Story" data-zh="保存故事">Save Story</span>
            </button>
        </div>
        
        <!-- Tab 2: Generate from Text -->
        <div class="form-section" id="textSection">
            <input type="text" id="textStoryName" class="name-input" 
                   placeholder="Story title..." 
                   data-en-placeholder="Story title..."
                   data-zh-placeholder="故事标题...">
            
            <textarea id="textContent" class="text-input" 
                      placeholder="Enter story content..." 
                      data-en-placeholder="Enter story content..."
                      data-zh-placeholder="输入故事内容..."></textarea>
            
            <select id="voiceLang" class="lang-select">
                <option value="zh">🇨🇳 中文</option>
                <option value="en">🇺🇸 English</option>
                <option value="fi">🇫🇮 Suomi</option>
                <option value="ja">🇯🇵 日本語</option>
                <option value="ko">🇰🇷 한국어</option>
            </select>
            
            <button class="submit-btn gen-style" onclick="generateTextStory()">
                ✨ <span data-en="Generate & Save Story" data-zh="生成并保存故事">Generate & Save Story</span>
            </button>
        </div>
        
        <!-- Stories List -->
        <div class="stories-list">
            <h3 class="stories-title" data-en="My Stories" data-zh="我的故事">My Stories</h3>
            <div id="storiesContainer">
                <p class="empty-state" data-en="No stories yet. Create your first story!"
                   data-zh="还没有故事。创建你的第一个故事！">
                    No stories yet. Create your first story!
                </p>
            </div>
        </div>
        
        <div class="ad-section">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-1113273813232585"
                 data-ad-slot="1234567890"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
        </div>
    </div>
    
    <script>
        // Language
        const langBtns = document.querySelectorAll('.lang-btn');
        let currentLang = localStorage.getItem('leo-tools-lang') || 'en';
        
        function updateLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-en][data-zh]').forEach(el => {
                el.textContent = el.dataset[lang];
            });
            document.querySelectorAll('[data-en-placeholder][data-zh-placeholder]').forEach(el => {
                el.placeholder = el.dataset[lang + '-placeholder'];
            });
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
            document.documentElement.lang = lang;
            localStorage.setItem('leo-tools-lang', lang);
        }
        
        langBtns.forEach(btn => {
            btn.addEventListener('click', () => updateLanguage(btn.dataset.lang));
        });
        
        const savedLang = localStorage.getItem('leo-tools-lang') || 'en';
        document.querySelector(`.lang-btn[data-lang="${savedLang}"]`).click();
        
        // Tab Switching
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
            document.getElementById(tab + 'Section').classList.add('active');
        }
        
        // Audio Upload
        let selectedAudioFile = null;
        let audioFileUrl = null;
        
        const audioFileInput = document.getElementById('audioFileInput');
        const uploadSection = document.getElementById('uploadSection');
        
        audioFileInput.addEventListener('change', handleAudioFile);
        
        // Drag and drop
        uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSection.style.borderColor = '#00d9ff';
        });
        uploadSection.addEventListener('dragleave', () => {
            uploadSection.style.borderColor = 'rgba(255,255,255,0.2)';
        });
        uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSection.style.borderColor = 'rgba(255,255,255,0.2)';
            const files = e.dataTransfer.files;
            if (files.length > 0) handleAudioFile({target: {files: files}});
        });
        
        function handleAudioFile(e) {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('audio/')) {
                alert(currentLang === 'en' ? 'Please select an audio file!' : '请选择音频文件！');
                return;
            }
            selectedAudioFile = file;
            document.getElementById('audioFileName').textContent = file.name;
            document.getElementById('audioFileDisplay').style.display = 'block';
            
            if (audioFileUrl) URL.revokeObjectURL(audioFileUrl);
            audioFileUrl = URL.createObjectURL(file);
        }
        
        // Save Audio Story
        function saveAudioStory() {
            const name = document.getElementById('audioStoryName').value.trim();
            
            if (!selectedAudioFile) {
                alert(currentLang === 'en' ? 'Please upload an audio file!' : '请上传音频文件！');
                return;
            }
            if (!name) {
                alert(currentLang === 'en' ? 'Please enter a story name!' : '请输入故事名称！');
                return;
            }
            
            const story = {
                id: Date.now(),
                type: 'audio',
                name: name,
                audioFile: selectedAudioFile.name,
                audioUrl: audioFileUrl,
                textContent: '',
                createdAt: new Date().toISOString()
            };
            
            stories.unshift(story);
            saveStories();
            resetAudioForm();
            renderStories();
        }
        
        function resetAudioForm() {
            selectedAudioFile = null;
            audioFileUrl = null;
            document.getElementById('audioFileInput').value = '';
            document.getElementById('audioFileDisplay').style.display = 'none';
            document.getElementById('audioStoryName').value = '';
        }
        
        // Generate Text Story
        function generateTextStory() {
            const name = document.getElementById('textStoryName').value.trim();
            const content = document.getElementById('textContent').value.trim();
            const lang = document.getElementById('voiceLang').value;
            
            if (!name) {
                alert(currentLang === 'en' ? 'Please enter a story title!' : '请输入故事标题！');
                return;
            }
            if (!content) {
                alert(currentLang === 'en' ? 'Please enter story content!' : '请输入故事内容！');
                return;
            }
            
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '⏳ ' + (currentLang === 'en' ? 'Generating...' : '生成中...');
            
            // First generate title, then content
            const fullText = name + '。' + content;
            
            fetch('http://localhost:3000/speak', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: fullText, language: lang})
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const byteCharacters = atob(data.audio);
                    const byteNumbers = new Array(byteCharacters.length);
                    for (let i = 0; i < byteCharacters.length; i++) {
                        byteNumbers[i] = byteCharacters.charCodeAt(i);
                    }
                    const byteArray = new Uint8Array(byteNumbers);
                    const blob = new Blob([byteArray], {type: 'audio/wav'});
                    const audioUrl = URL.createObjectURL(blob);
                    
                    const story = {
                        id: Date.now(),
                        type: 'tts',
                        name: name,
                        textContent: content,
                        audioUrl: audioUrl,
                        language: lang,
                        createdAt: new Date().toISOString()
                    };
                    
                    stories.unshift(story);
                    saveStories();
                    resetTextForm();
                    renderStories();
                } else {
                    throw new Error(data.error);
                }
            })
            .catch(err => {
                console.error(err);
                alert(currentLang === 'en' ? 'Generation failed. Make sure TTS server is running!' : '生成失败，请确保 TTS 服务器正在运行！');
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = '✨ ' + (currentLang === 'en' ? 'Generate & Save Story' : '生成并保存故事');
            });
        }
        
        function resetTextForm() {
            document.getElementById('textStoryName').value = '';
            document.getElementById('textContent').value = '';
        }
        
        // Stories Management
        let stories = JSON.parse(localStorage.getItem('leo-stories') || '[]');
        
        function saveStories() {
            // Clean up blob URLs before saving (we'll recreate them)
            const storiesToSave = stories.map(s => ({
                ...s,
                audioUrl: null,
                genUrl: null
            }));
            localStorage.setItem('leo-stories', JSON.stringify(storiesToSave));
        }
        
        function playStoryAudio(storyId) {
            const story = stories.find(s => s.id === storyId);
            if (story) {
                if (story.type === 'audio' && story.audioUrl) {
                    const audio = new Audio(story.audioUrl);
                    audio.play();
                } else if (story.type === 'tts' && story.audioUrl) {
                    const audio = new Audio(story.audioUrl);
                    audio.play();
                }
            }
        }
        
        function deleteStory(storyId) {
            stories = stories.filter(s => s.id !== storyId);
            saveStories();
            renderStories();
        }
        
        function renderStories() {
            const container = document.getElementById('storiesContainer');
            
            if (stories.length === 0) {
                container.innerHTML = `<p class="empty-state" data-en="No stories yet. Create your first story!"
                       data-zh="还没有故事。创建你的第一个故事！">
                    No stories yet. Create your first story!
                </p>`;
                return;
            }
            
            container.innerHTML = stories.map(story => `
                <div class="story-card">
                    <div class="story-header">
                        <span class="story-name">${story.name}</span>
                        <span class="story-type ${story.type}">
                            ${story.type === 'audio' ? '🎵 Audio' : '✨ TTS'}
                        </span>
                    </div>
                    ${story.textContent ? `<div class="story-content">${story.textContent}</div>` : ''}
                    <div class="play-btns">
                        <button class="play-btn main" onclick="playStoryAudio(${story.id})">
                            ▶ <span data-en="Play" data-zh="播放">Play</span>
                        </button>
                        <button class="play-btn delete" onclick="deleteStory(${story.id})">
                            🗑️ <span data-en="Delete" data-zh="删除">Delete</span>
                        </button>
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('[data-en][data-zh]').forEach(el => {
                el.textContent = el.dataset[currentLang];
            });
        }
        
        // Load ads
        (adsbygoogle = window.adsbygoogle || []).push({});
        
        // Initial render
        renderStories();
    </script>
</body>
</html>
