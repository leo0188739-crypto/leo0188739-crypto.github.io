<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finnish Word Explorer - Leo Tools</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1113273813232585"
     crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        header {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .lang-group { display: flex; gap: 8px; }
        .lang-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .lang-btn.active { background: #00d9ff; color: #1a1a2e; }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 30px;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        h2 { font-size: 1.8rem; margin-bottom: 20px; color: #00d9ff; }
        .description {
            color: #aaa;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #00d9ff;
        }
        button {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            color: #1a1a2e;
            margin-right: 10px;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .result {
            margin-top: 30px;
            padding: 25px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            display: none;
            line-height: 1.8;
        }
        .result.show { display: block; }
        .result h3 {
            color: #00d9ff;
            margin-bottom: 15px;
            font-size: 1.3rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .result p { margin-bottom: 12px; }
        .result .label {
            color: #00ff88;
            font-weight: bold;
            display: inline-block;
            min-width: 100px;
        }
        .result .en { color: #ffd700; }
        
        .loading {
            text-align: center;
            padding: 20px;
            display: none;
            color: #00d9ff;
        }
        .loading.show { display: block; }
        .ad-section { margin: 20px 0; text-align: center; }
        
        .note {
            background: rgba(255,200,0,0.1);
            border: 1px solid rgba(255,200,0,0.3);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #ffd700;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>🛠️ Leo Tools</h1>
            <div class="lang-group">
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="zh">中文</button>
            </div>
        </div>
    </header>
    
    <div class="container">
        <a href="/" class="back-btn">← <span data-en="Back to Tools" data-zh="返回工具主页">Back to Tools</span></a>
        
        <h2 data-en="Finnish Word Explorer" data-zh="芬兰语单词详解">Finnish Word Explorer</h2>
        
        <div class="note" data-en="💡 How to use: Click 'Explain' to generate a prompt, then copy it and ask me (Kiki) on Telegram/WhatsApp for the full analysis. I'll reply with detailed explanation!"
           data-zh="💡 使用方法：点击"解释"按钮生成提示词，然后复制并在 Telegram/WhatsApp 上问我（Kiki），我会给你详细解释！">
            💡 This tool uses AI to analyze Finnish words.
        </div>
        
        <p class="description" data-en="Enter a Finnish word to get a detailed explanation including its base form, part of speech, meaning, etymology, and translations in both Chinese and English." 
           data-zh="输入一个芬兰语单词，获取详细解释，包括：原型、词性、中文含义、词根来源，以及中文和英文翻译。">
            Enter a Finnish word...
        </p>
        
        <input type="text" id="word-input" placeholder="Enter Finnish word...">
        
        <button onclick="explainWord()" id="explain-btn" data-en="Explain Word" data-zh="解释单词">Explain Word</button>
        
        <div class="loading" id="loading">
            <span data-en="🤔 Analyzing word, please wait..." data-zh="🤔 正在分析单词，请稍候...">Analyzing...</span>
        </div>
        
        <div id="result" class="result"></div>
        
        <div class="ad-section">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-1113273813232585"
                 data-ad-slot="1234567890"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
        </div>
    </div>
    
    <script>
        // Language
        const langBtns = document.querySelectorAll('.lang-btn');
        let currentLang = localStorage.getItem('leo-tools-lang') || 'en';
        
        function updateLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-en][data-zh]').forEach(el => {
                el.textContent = el.dataset[lang];
            });
            document.querySelectorAll('input[data-placeholder-en]').forEach(el => {
                el.placeholder = el.dataset[lang + '-placeholder'] || el.placeholder;
            });
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
            document.documentElement.lang = lang;
            localStorage.setItem('leo-tools-lang', lang);
        }
        
        langBtns.forEach(btn => {
            btn.addEventListener('click', () => updateLanguage(btn.dataset.lang));
        });
        
        // Set initial language
        const savedLang = localStorage.getItem('leo-tools-lang') || 'en';
        document.querySelector(`.lang-btn[data-lang="${savedLang}"]`).click();
        
        // Explain Word - Generate prompt for user to copy
        function explainWord() {
            const word = document.getElementById('word-input').value.trim();
            if (!word) return;
            
            const result = document.getElementById('result');
            const isZh = currentLang === 'zh';
            
            const prompt = isZh 
                ? `请详细解释以下芬兰语单词 "${word}"，给出：1.原型(如果是变形词) 2.词性(动词/名词/形容词/副词等) 3.中文含义 4.词根来源/词源 5.英文翻译。请尽可能详细。`
                : `Please explain this Finnish word "${word}" in detail: 1. base/original form 2. part of speech 3. meaning in Chinese 4. etymology 5. English translation. Be as detailed as possible.`;
            
            const tgLink = `https://t.me/leo_kiki_bot?text=${encodeURIComponent(prompt)}`;
            const waLink = `https://wa.me/34644281320?text=${encodeURIComponent(prompt)}`;
            
            result.innerHTML = `
                <h3>📖 ${word}</h3>
                <p>${isZh ? '✅ 点击下方按钮直接在 Telegram/WhatsApp 上问我：' : '✅ Click the button below to ask me on Telegram/WhatsApp:'}</p>
                <div style="margin: 15px 0;">
                    <a href="${tgLink}" target="_blank" style="display:inline-block; background:#0088cc; color:#fff; padding:12px 24px; border-radius:8px; text-decoration:none; margin-right:10px;">📱 Telegram</a>
                    <a href="${waLink}" target="_blank" style="display:inline-block; background:#25D366; color:#fff; padding:12px 24px; border-radius:8px; text-decoration:none;">💬 WhatsApp</a>
                </div>
                <p style="margin-top:15px; color:#aaa;">${isZh ? '或者复制提示词：' : 'Or copy the prompt:'}</p>
                <div style="background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; margin: 10px 0; font-family: monospace; white-space: pre-wrap; word-break: break-all; font-size: 0.9rem;">${prompt}</div>
                <button onclick="navigator.clipboard.writeText('${prompt.replace(/'/g, "\\'")}')" style="margin-top:10px;">📋 ${isZh ? '复制提示词' : 'Copy Prompt'}</button>
            `;
            result.classList.add('show');
        }
    </script>
    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
