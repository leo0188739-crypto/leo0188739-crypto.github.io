<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finnish Word Explorer - Leo Tools</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1113273813232585"
     crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        header {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .lang-group { display: flex; gap: 8px; }
        .lang-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .lang-btn.active { background: #00d9ff; color: #1a1a2e; }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 30px;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        h2 { font-size: 1.8rem; margin-bottom: 20px; color: #00d9ff; }
        .description { color: #aaa; margin-bottom: 20px; line-height: 1.6; }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
        input[type="text"]:focus { outline: none; border-color: #00d9ff; }
        button {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            color: #1a1a2e;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .result {
            margin-top: 30px;
            padding: 25px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            display: none;
            line-height: 1.8;
        }
        .result.show { display: block; }
        .result h3 { color: #00d9ff; margin-bottom: 15px; font-size: 1.3rem; }
        .result .section { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .result .section:last-child { border-bottom: none; margin-bottom: 0; }
        .result .label { color: #00ff88; font-weight: bold; display: block; margin-bottom: 5px; }
        .result .zh { color: #fff; }
        .result .en { color: #ffd700; }
        
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
            color: #00d9ff;
        }
        .loading.show { display: block; }
        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #00d9ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .ad-section { margin: 20px 0; text-align: center; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>🛠️ Leo Tools</h1>
            <div class="lang-group">
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="zh">中文</button>
            </div>
        </div>
    </header>
    
    <div class="container">
        <a href="/" class="back-btn">← <span data-en="Back to Tools" data-zh="返回工具主页">Back to Tools</span></a>
        
        <h2 data-en="Finnish Word Explorer" data-zh="芬兰语单词详解">Finnish Word Explorer</h2>
        
        <p class="description" data-en="Enter a Finnish word to get a detailed explanation: base form, part of speech, Chinese & English meanings, and etymology." 
           data-zh="输入芬兰语单词，获取详细解释：原型、词性、中文和英文含义、词源。">
        </p>
        
        <input type="text" id="word-input" placeholder="Enter Finnish word...">
        
        <button onclick="explainWord()" id="explain-btn" data-en="Explain Word" data-zh="解释单词">Explain Word</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <span data-en="Analyzing word..." data-zh="正在分析单词...">Analyzing...</span>
        </div>
        
        <div id="result" class="result"></div>
        
        <div class="ad-section">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-1113273813232585"
                 data-ad-slot="1234567890"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
        </div>
    </div>
    
    <script>
        // Language
        const langBtns = document.querySelectorAll('.lang-btn');
        let currentLang = localStorage.getItem('leo-tools-lang') || 'en';
        
        function updateLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-en][data-zh]').forEach(el => {
                el.textContent = el.dataset[lang];
            });
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
            document.documentElement.lang = lang;
            localStorage.setItem('leo-tools-lang', lang);
        }
        
        langBtns.forEach(btn => {
            btn.addEventListener('click', () => updateLanguage(btn.dataset.lang));
        });
        
        const savedLang = localStorage.getItem('leo-tools-lang') || 'en';
        document.querySelector(`.lang-btn[data-lang="${savedLang}"]`).click();
        
        // Explain Word via Groq API
        async function explainWord() {
            const word = document.getElementById('word-input').value.trim();
            if (!word) return;
            
            const btn = document.getElementById('explain-btn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            
            btn.disabled = true;
            loading.classList.add('show');
            result.classList.remove('show');
            result.innerHTML = '';
            
            const isZh = currentLang === 'zh';
            
            const systemPrompt = isZh 
                ? `你是一个专业的芬兰语词典助手。请详细解释用户给出的芬兰语单词，按照以下格式回复：
1. 原型 (base form)
2. 词性 (part of speech): 动词/名词/形容词/副词/代词/介词/连词等
3. 中文含义
4. 英文翻译
5. 词源/词根 (etymology)
6. 例句 (如果有)

请用中文回复，英文翻译单独列出。要尽可能详细和准确。`
                : `You are a professional Finnish language dictionary assistant. Please explain the Finnish word in detail with the following format:
1. Base form (original form)
2. Part of speech: verb/noun/adjective/adverb/pronoun/preposition/conjunction etc
3. Chinese meaning
4. English translation
5. Etymology/word roots
6. Example sentences (if available)

Reply in English. Be as detailed and accurate as possible.`;
            
            const userPrompt = isZh 
                ? `请详细解释这个芬兰语单词：${word}`
                : `Please explain this Finnish word in detail: ${word}`;
            
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer 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'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: [
                            {role: 'system', content: systemPrompt},
                            {role: 'user', content: userPrompt}
                        ],
                        temperature: 0.7,
                        max_tokens: 2000
                    })
                });
                
                const data = await response.json();
                const explanation = data.choices?.[0]?.message?.content;
                
                if (explanation) {
                    // Format the result nicely
                    result.innerHTML = `<h3>📖 ${word}</h3><div style="white-space: pre-wrap; line-height: 1.8;">${explanation}</div>`;
                } else {
                    result.innerHTML = `<h3>${word}</h3><p>Error: ${data.error?.message || 'Unknown error'}</p>`;
                }
            } catch (e) {
                result.innerHTML = `<h3>${word}</h3><p>Error: ${e.message}</p>`;
            }
            
            loading.classList.remove('show');
            btn.disabled = false;
            result.classList.add('show');
        }
    </script>
    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
